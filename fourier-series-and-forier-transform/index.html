<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Señales Periódicas & Serie de Fourier</title>
    <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #ffffff;
            --bg-secondary: #f7f7f8;
            --bg-tertiary: #e7e8ec;
            --text-primary: #27272a;
            --text-secondary: #696a73;
            --border-color: #d8dae0;
            --accent-color: #d84f72;
            --accent-hover: #c63f62;
            --input-bg: #ffffff;
            --hover-bg: #eceef3;
            --shadow: rgba(0, 0, 0, 0.1);
        }

        [data-theme="dark"] {
            --bg-primary: #1f1f23;
            --bg-secondary: #2a2a30;
            --bg-tertiary: #383941;
            --text-primary: #f1f1f3;
            --text-secondary: #bbbcc5;
            --border-color: #494a54;
            --accent-color: #ff6f91;
            --accent-hover: #ff5d84;
            --input-bg: #24242a;
            --hover-bg: #33343c;
            --shadow: rgba(0, 0, 0, 0.3);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            display: flex;
            height: 100vh;
            overflow: hidden;
            transition: background-color 0.3s, color 0.3s;
        }

        .sidebar {
            width: 320px;
            background-color: var(--bg-secondary);
            border-right: 1px solid var(--border-color);
            overflow-y: auto;
            overflow-x: hidden;
            padding: 20px;
            transition: background-color 0.3s;
        }

        .sidebar::-webkit-scrollbar {
            width: 8px;
        }

        .sidebar::-webkit-scrollbar-track {
            background: var(--bg-secondary);
        }

        .sidebar::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 4px;
        }

        .sidebar::-webkit-scrollbar-thumb:hover {
            background: var(--text-secondary);
        }

        .main-content {
            flex: 1;
            padding: 20px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .section {
            background-color: var(--bg-secondary);
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 20px;
            box-shadow: 0 2px 4px var(--shadow);
            transition: background-color 0.3s;
        }

        .section-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 15px;
            color: var(--text-primary);
            border-bottom: 2px solid var(--accent-color);
            padding-bottom: 8px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-size: 14px;
            color: var(--text-secondary);
            font-weight: 500;
        }

        input[type="number"],
        select {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            font-size: 14px;
            background-color: var(--input-bg);
            color: var(--text-primary);
            transition: border-color 0.3s, background-color 0.3s;
        }

        input[type="number"]:focus,
        select:focus {
            outline: none;
            border-color: var(--accent-color);
        }

        input[type="number"]:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
        }

        .checkbox-group input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: var(--accent-color);
        }

        .checkbox-group input[type="checkbox"]:disabled {
            cursor: not-allowed;
            opacity: 0.4;
        }

        .checkbox-group label {
            margin: 0;
            cursor: pointer;
            user-select: none;
        }

        .checkbox-group input[type="checkbox"]:disabled + label {
            cursor: not-allowed;
            opacity: 0.4;
        }

        .radio-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .radio-option {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .radio-option input[type="radio"] {
            width: 16px;
            height: 16px;
            cursor: pointer;
            accent-color: var(--accent-color);
        }

        .radio-option label {
            margin: 0;
            cursor: pointer;
            user-select: none;
        }

        .plot-container {
            flex: 1;
            background-color: var(--bg-secondary);
            border-radius: 8px;
            padding: 10px;
            box-shadow: 0 2px 4px var(--shadow);
            display: flex;
            flex-direction: column;
            min-height: 0;
        }

        .plot-wrapper {
            flex: 1;
            min-height: 0;
            width: 100%;
            height: 100%;
        }

        .plots-grid {
            display: flex;
            flex-direction: column;
            gap: 15px;
            height: 100%;
            min-height: 0;
        }

        .plot-row {
            flex: 1;
            min-height: 0;
            min-width: 0;
            display: flex;
        }

        .spectrum-column {
            flex-direction: column;
            gap: 15px;
        }

        .phase-only {
            display: none;
        }

        .plots-grid.phase-layout {
            display: grid;
            grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
            grid-template-rows: minmax(0, 1fr);
        }

        .plots-grid.phase-layout .plot-row {
            height: 100%;
        }

        .plots-grid.phase-layout .phase-only {
            display: flex;
        }

        h1 {
            font-size: 24px;
            margin-bottom: 20px;
            color: var(--accent-color);
        }

        .info-text {
            font-size: 12px;
            color: var(--text-secondary);
            margin-top: 5px;
            font-style: italic;
        }

        button {
            width: 100%;
            padding: 10px;
            background-color: var(--accent-color);
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.3s;
        }

        button:hover {
            opacity: 0.9;
        }

        button:active {
            opacity: 0.8;
        }

        .settings-toolbar {
            display: flex;
            align-items: flex-end;
            gap: 12px;
        }

        .setting-block {
            flex: 1;
            min-width: 0;
        }

        .language-selector {
            display: flex;
            gap: 4px;
            padding: 4px;
            background-color: var(--bg-tertiary);
            border-radius: 8px;
        }

        .lang-btn {
            flex: 1;
            width: auto;
            padding: 8px 7px;
            color: var(--text-primary);
            background-color: transparent;
            border: none;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 0;
            transition: background-color 0.2s, color 0.2s, box-shadow 0.2s;
        }

        .lang-btn:hover {
            opacity: 1;
            background-color: var(--hover-bg);
        }

        .lang-btn.active {
            color: #ffffff;
            background-color: var(--accent-color);
            box-shadow: 0 2px 5px var(--shadow);
        }

        .icon-btn {
            width: 100%;
            height: 40px;
            padding: 8px 10px;
            color: var(--text-primary);
            background-color: var(--bg-primary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: background-color 0.2s, border-color 0.2s, transform 0.2s;
        }

        .icon-btn:hover {
            opacity: 1;
            background-color: var(--hover-bg);
            border-color: var(--accent-color);
            transform: translateY(-1px);
        }

        .icon-btn:active {
            transform: translateY(0);
        }

        .theme-icon {
            font-size: 17px;
            line-height: 1;
        }

        .primary-btn {
            background-color: var(--accent-color);
        }

        .primary-btn:hover {
            opacity: 1;
            background-color: var(--accent-hover);
        }
    </style>
</head>
<body data-theme="light">
    <div class="sidebar">
        <h1 id="app-title">Señales Periódicas & Serie de Fourier</h1>

        <!-- Interface Settings -->
        <div class="section">
            <div class="section-title" id="interface-title">Interfaz</div>
            <div class="settings-toolbar">
                <div class="setting-block">
                    <label id="lang-label">Idioma</label>
                    <div class="language-selector" role="group" aria-labelledby="lang-label">
                        <button type="button" class="lang-btn" data-lang="es">ES</button>
                        <button type="button" class="lang-btn active" data-lang="en">EN</button>
                        <button type="button" class="lang-btn" data-lang="fr">FR</button>
                    </div>
                </div>
                <div class="setting-block">
                    <label id="theme-label" for="theme-toggle">Tema</label>
                    <button type="button" id="theme-toggle" class="icon-btn" title="Toggle theme" aria-label="Toggle theme">
                        <span id="theme-icon" class="theme-icon" aria-hidden="true">&#9790;</span>
                        <span id="theme-toggle-label">Dark</span>
                    </button>
                </div>
            </div>
        </div>

        <!-- Signal Type Selection -->
        <div class="section">
            <div class="section-title" id="signal-title">Señal 1</div>
            <div class="form-group">
                <label id="signal-type-label">Tipo de Señal</label>
                <div class="radio-group">
                    <div class="radio-option">
                        <input type="radio" id="signal-sine" name="signal-type" value="sine" checked>
                        <label for="signal-sine" id="signal-sine-label">Sinusoidal Pura</label>
                    </div>
                    <div class="radio-option">
                        <input type="radio" id="signal-square" name="signal-type" value="square">
                        <label for="signal-square" id="signal-square-label">Cuadrada</label>
                    </div>
                    <div class="radio-option">
                        <input type="radio" id="signal-triangle" name="signal-type" value="triangle">
                        <label for="signal-triangle" id="signal-triangle-label">Triangular</label>
                    </div>
                </div>
            </div>
            
            <div class="form-group">
                <label for="amplitude" id="amplitude-label">Amplitud Pico a Pico (V)</label>
                <input type="number" id="amplitude" value="4" step="0.1" min="0.1">
            </div>

            <div class="form-group">
                <label for="offset" id="offset-label">Offset (V)</label>
                <input type="number" id="offset" value="0" step="0.1">
            </div>

            <div class="form-group">
                <label for="frequency" id="frequency-label">Frecuencia (Hz)</label>
                <input type="number" id="frequency" value="1000" step="10" min="10">
            </div>

            <div class="form-group">
                <label for="duty-cycle" id="duty-label">Duty Cycle (%)</label>
                <input type="number" id="duty-cycle" value="50" step="1" min="1" max="99" disabled>
                <div class="info-text" id="duty-info">Solo para onda cuadrada</div>
            </div>
        </div>

        <!-- Second Signal -->
        <div class="section">
            <div class="checkbox-group">
                <input type="checkbox" id="enable-signal2">
                <label for="enable-signal2" id="enable-signal2-label">Agregar 2ª señal</label>
            </div>
            <div id="signal2-controls" style="display: none;">
                <div class="section-title" id="signal2-title" style="margin-top: 10px; border-top: 1px solid var(--border-color); padding-top: 15px;">Señal 2</div>
                <div class="form-group">
                    <label id="signal-type2-label">Tipo de Señal</label>
                    <div class="radio-group">
                        <div class="radio-option">
                            <input type="radio" id="signal2-sine" name="signal-type2" value="sine" checked>
                            <label for="signal2-sine" id="signal2-sine-label">Sinusoidal Pura</label>
                        </div>
                        <div class="radio-option">
                            <input type="radio" id="signal2-square" name="signal-type2" value="square">
                            <label for="signal2-square" id="signal2-square-label">Cuadrada</label>
                        </div>
                        <div class="radio-option">
                            <input type="radio" id="signal2-triangle" name="signal-type2" value="triangle">
                            <label for="signal2-triangle" id="signal2-triangle-label">Triangular</label>
                        </div>
                    </div>
                </div>
                <div class="form-group">
                    <label for="amplitude2" id="amplitude2-label">Amplitud Pico a Pico (V)</label>
                    <input type="number" id="amplitude2" value="2" step="0.1" min="0.1">
                </div>
                <div class="form-group">
                    <label for="frequency2" id="frequency2-label">Frecuencia (Hz)</label>
                    <input type="number" id="frequency2" value="3000" step="10" min="10">
                </div>
                <div class="form-group">
                    <label for="duty-cycle2" id="duty2-label">Duty Cycle (%)</label>
                    <input type="number" id="duty-cycle2" value="50" step="1" min="1" max="99" disabled>
                    <div class="info-text" id="duty2-info">Solo para onda cuadrada</div>
                </div>
            </div>
        </div>

        <!-- Noise -->
        <div class="section">
            <div class="checkbox-group">
                <input type="checkbox" id="enable-noise">
                <label for="enable-noise" id="enable-noise-label">Agregar ruido</label>
            </div>
            <div id="noise-controls" style="display: none;">
                <div class="section-title" id="noise-title" style="margin-top: 10px; border-top: 1px solid var(--border-color); padding-top: 15px;">Ruido</div>
                <div class="form-group">
                    <label for="noise-level" id="noise-level-label">Nivel de Ruido RMS (mV)</label>
                    <input type="number" id="noise-level" value="50" step="1" min="1">
                    <div class="info-text" id="noise-info">Ruido blanco gaussiano</div>
                </div>
            </div>
        </div>

        <!-- Sampling Options -->
        <div class="section">
            <div class="section-title" id="sampling-title">Opciones de Muestra</div>
            
            <div class="form-group">
                <label for="cycles" id="cycles-label">Número de Ciclos Mostrados</label>
                <input type="number" id="cycles" value="5" step="1" min="1">
            </div>

            <div class="form-group">
                <label for="max-freq" id="maxfreq-label">Frecuencia Máxima (Hz)</label>
                <input type="number" id="max-freq" value="20000" step="10" min="10">
                <div class="info-text" id="maxfreq-info">Default: 20 × frecuencia señal</div>
            </div>
        </div>

        <!-- Scale Options -->
        <div class="section">
            <div class="section-title" id="scale-title">Escalas</div>
            
            <div class="form-group">
                <label for="x-scale" id="xscale-label">Escala X</label>
                <select id="x-scale">
                    <option value="linear" id="xscale-linear">Lineal</option>
                    <option value="log" id="xscale-log">Logarítmica</option>
                </select>
            </div>

            <div class="form-group">
                <label for="y-scale" id="yscale-label">Escala Y</label>
                <select id="y-scale">
                    <option value="linear" id="yscale-vv">V/V</option>
                    <option value="db" id="yscale-db">dB</option>
                </select>
            </div>
        </div>

        <!-- Display Options -->
        <div class="section">
            <div class="section-title" id="display-title">Opciones de Visualización</div>
            
            <div class="checkbox-group">
                <input type="checkbox" id="show-phase">
                <label for="show-phase" id="phase-label">Mostrar Fase</label>
            </div>

            <div class="checkbox-group">
                <input type="checkbox" id="show-advanced">
                <label for="show-advanced" id="advanced-label">Modo Avanzado</label>
            </div>
        </div>

        <!-- Advanced Mode -->
        <div class="section" id="advanced-section" style="display: none;">
            <div class="section-title" id="advanced-title">Modo Avanzado</div>
            
            <div class="form-group">
                <label for="analysis-type" id="analysis-type-label">Tipo de Análisis</label>
                <select id="analysis-type">
                    <option value="fourier" id="analysis-fourier">Serie de Fourier</option>
                    <option value="fft" id="analysis-fft">FFT (Osciloscopio)</option>
                </select>
            </div>

            <div class="checkbox-group">
                <input type="checkbox" id="continuous-mode" checked>
                <label for="continuous-mode" id="continuous-label">Líneas Continuas</label>
            </div>

            <div class="form-group" id="window-group">
                <label for="window-type" id="window-label">Tipo de Ventana</label>
                <select id="window-type">
                    <option value="rectangular" id="window-rectangular">Rectangular</option>
                    <option value="hamming" id="window-hamming">Hamming</option>
                    <option value="hanning" id="window-hanning">Hanning</option>
                    <option value="blackman" id="window-blackman">Blackman</option>
                    <option value="flattop" id="window-flattop">Flat Top</option>
                </select>
            </div>


        </div>

        <button id="update-btn" class="primary-btn" onclick="updatePlots()">Actualizar Gráficos</button>
    </div>

    <div class="main-content">
        <div id="plots-grid" class="plots-grid">
            <div id="time-column" class="plot-row">
                <div class="plot-container">
                    <div id="plot1" class="plot-wrapper"></div>
                </div>
            </div>
            <div id="spectrum-column" class="plot-row spectrum-column">
                <div class="plot-container">
                    <div id="plot2" class="plot-wrapper"></div>
                </div>
                <div id="phase-plot-container" class="plot-container phase-only" aria-hidden="true">
                    <div id="plot3" class="plot-wrapper"></div>
                </div>
            </div>
        </div>
    </div>

        // Window functions
        function applyWindow(signal, windowType) {
            const N = signal.length;
            const windowed = [];

            for (let n = 0; n < N; n++) {
                let w = 1;
                
                switch(windowType) {
                    case 'rectangular':
                        w = 1;
                        break;
                    case 'hamming':
                        w = 0.54 - 0.46 * Math.cos(2 * Math.PI * n / (N - 1));
                        break;
                    case 'hanning':
                        w = 0.5 - 0.5 * Math.cos(2 * Math.PI * n / (N - 1));
                        break;
                    case 'blackman':
                        w = 0.42 - 0.5 * Math.cos(2 * Math.PI * n / (N - 1)) + 
                            0.08 * Math.cos(4 * Math.PI * n / (N - 1));
                        break;
                    case 'flattop':
                        const a0 = 0.21557895;
                        const a1 = 0.41663158;
                        const a2 = 0.277263158;
                        const a3 = 0.083578947;
                        const a4 = 0.006947368;
                        w = a0 - a1 * Math.cos(2 * Math.PI * n / (N - 1)) +
                            a2 * Math.cos(4 * Math.PI * n / (N - 1)) -
                            a3 * Math.cos(6 * Math.PI * n / (N - 1)) +
                            a4 * Math.cos(8 * Math.PI * n / (N - 1));
                        break;
                }
                
                windowed.push(signal[n] * w);
            }

            return windowed;
        }

        // Calculate FFT (using DFT algorithm optimized for display)
        function calculateFFT(signal, sampleRate, maxFreq) {
            const N = signal.length;
            const freqs = [];
            const magnitudes = [];
            const phases = [];

            const maxBin = Math.min(Math.floor(N / 2), Math.floor(maxFreq * N / sampleRate));

            for (let k = 0; k <= maxBin; k++) {
                const freq = k * sampleRate / N;
                if (freq > maxFreq) break;

                let real = 0;
                let imag = 0;

                for (let n = 0; n < N; n++) {
                    const angle = -2 * Math.PI * k * n / N;
                    real += signal[n] * Math.cos(angle);
                    imag += signal[n] * Math.sin(angle);
                }

                // Normalize for oscilloscope-like display (RMS for sine waves)
                // Multiply by 2/N for amplitude, then divide by sqrt(2) for RMS
                const normFactor = 2 / N;
                real *= normFactor;
                imag *= normFactor;

                const magnitude = Math.sqrt(real * real + imag * imag);
                
                // Set phase to 0 if magnitude is negligible
                const threshold = 1e-6;
                let phase = 0;
                if (magnitude > threshold) {
                    phase = Math.atan2(imag, real);
                    // Convert to degrees
                    phase = phase * 180 / Math.PI;
                }

                freqs.push(freq);
                magnitudes.push(magnitude);
                phases.push(phase);
            }

            return {freqs, magnitudes, phases};
        }

        // Generate time-domain signal
        function generateSignal(type, amplitude, offset, frequency, dutyCycle, duration, sampleRate) {
            const numSamples = Math.floor(duration * sampleRate);
            const t = Array.from({length: numSamples}, (_, i) => i / sampleRate);
            const signal = [];
            const amp = amplitude / 2; // Convert peak-to-peak to amplitude

            for (let i = 0; i < numSamples; i++) {
                const phase = 2 * Math.PI * frequency * t[i];
                let value = 0;

                switch(type) {
                    case 'sine':
                        value = amp * Math.sin(phase);
                        break;
                    case 'square':
                        const cyclePosition = (phase / (2 * Math.PI)) % 1;
                        value = cyclePosition < (dutyCycle / 100) ? amp : -amp;
                        break;
                    case 'triangle':
                        const trianglePhase = (phase / (2 * Math.PI)) % 1;
                        value = amp * (4 * Math.abs(trianglePhase - 0.5) - 1);
                        break;
                }
                signal.push(value + offset);
            }

            return {t, signal};
        }

        // Generate Gaussian white noise using Box-Muller transform
        function generateNoise(numSamples, rmsLevel) {
            const noise = [];
            for (let i = 0; i < numSamples; i += 2) {
                // Box-Muller transform to generate Gaussian random numbers
                const u1 = Math.random();
                const u2 = Math.random();
                const z0 = Math.sqrt(-2 * Math.log(u1)) * Math.cos(2 * Math.PI * u2);
                const z1 = Math.sqrt(-2 * Math.log(u1)) * Math.sin(2 * Math.PI * u2);
                
                noise.push(z0 * rmsLevel);
                if (i + 1 < numSamples) {
                    noise.push(z1 * rmsLevel);
                }
            }
            return noise;
        }

        // Calculate Fourier Series
        function calculateFourierSeries(signal, sampleRate, maxFreq, fundamentalFreq) {
            const N = signal.length;
            const freqs = [];
            const magnitudes = [];
            const phases = [];

            // Calculate up to maxFreq
            const maxHarmonic = Math.floor(maxFreq / fundamentalFreq);
            
            // Calculate number of samples per fundamental period
            const samplesPerPeriod = Math.round(sampleRate / fundamentalFreq);

            for (let k = 0; k <= maxHarmonic; k++) {
                const freq = k * fundamentalFreq;
                if (freq > maxFreq) break;

                let real = 0;
                let imag = 0;

                // Integrate over one period for better accuracy
                const numPeriods = Math.floor(N / samplesPerPeriod);
                const samplesToUse = numPeriods * samplesPerPeriod;

                // DFT calculation for specific harmonic
                for (let n = 0; n < samplesToUse; n++) {
                    const angle = 2 * Math.PI * k * n / samplesPerPeriod;
                    real += signal[n] * Math.cos(angle);
                    imag += signal[n] * Math.sin(angle);
                }

                real *= 2 / samplesToUse;
                imag *= 2 / samplesToUse;

                // For DC component (k=0), divide by 2
                if (k === 0) {
                    real /= 2;
                    imag /= 2;
                }

                const magnitude = Math.sqrt(real * real + imag * imag);
                
                // Set phase to 0 if magnitude is negligible
                const threshold = 1e-6;
                let phase = 0;
                if (magnitude > threshold) {
                    phase = Math.atan2(imag, real);
                    // Convert to degrees
                    phase = phase * 180 / Math.PI;
                }

                freqs.push(freq);
                magnitudes.push(magnitude);
                phases.push(phase);
            }

            return {freqs, magnitudes, phases};
        }

        // Unwrap phase (in degrees)
        function unwrapPhase(phases) {
            const unwrapped = [phases[0]];
            let offset = 0;

            for (let i = 1; i < phases.length; i++) {
                let diff = phases[i] - phases[i-1];
                
                // Detect jumps greater than 180 degrees
                if (diff > 180) {
                    offset -= 360;
                } else if (diff < -180) {
                    offset += 360;
                }
                
                unwrapped.push(phases[i] + offset);
            }

            return unwrapped;
        }

        // Convert to dB
        function toDecibels(magnitudes, continuousMode = false) {
            return magnitudes.map(m => {
                if (m <= 0) return continuousMode ? -120 : null; // En modo continuo usar -120 dB en lugar de null
                const db = 20 * Math.log10(m);
                // En modo continuo, limitar a -120 dB; en modo discreto, usar null si está por debajo de -100 dB
                if (continuousMode) {
                    return Math.max(db, -120);
                } else {
                    return db < -100 ? null : db;
                }
            });
        }

        function clearPlotSync(plotIds) {
            plotIds.forEach(id => {

        function syncPlotAxes(sourceId, targetId, axes, isUpdatingSource, setUpdatingTarget) {
            const source = document.getElementById(sourceId);
            source.on('plotly_relayout', function(eventdata) {
                if (isUpdatingSource()) return;

                const update = {};
                axes.forEach(axis => {
                    const rangeStart = `${axis}.range[0]`;
                    const rangeEnd = `${axis}.range[1]`;
                    const autorange = `${axis}.autorange`;

                    if (eventdata[rangeStart] !== undefined && eventdata[rangeEnd] !== undefined) {
                        update[`${axis}.range`] = [eventdata[rangeStart], eventdata[rangeEnd]];
                    } else if (eventdata[autorange]) {
                        update[autorange] = true;
                    }
                });

                if (!Object.keys(update).length) return;

                setUpdatingTarget(true);
                Plotly.relayout(targetId, update).finally(() => setUpdatingTarget(false));
            });
        }

        function linkSpectrumAxes() {
            let isUpdatingMagnitude = false;
            let isUpdatingPhase = false;
            const axes = ['xaxis', 'yaxis'];

            syncPlotAxes(
                'plot2',
                'plot3',
                axes,
                () => isUpdatingMagnitude,
                value => { isUpdatingPhase = value; }
            );
            syncPlotAxes(
                'plot3',
                'plot2',
                axes,
                () => isUpdatingPhase,
                value => { isUpdatingMagnitude = value; }
            );
        }

        // Update plots
        function updatePlots() {
            const t = translations[currentLang];
            const signalType = document.querySelector('input[name="signal-type"]:checked').value;
            const amplitude = parseFloat(document.getElementById('amplitude').value);
            const offset = parseFloat(document.getElementById('offset').value);
            const frequency = parseFloat(document.getElementById('frequency').value);
            const dutyCycle = parseFloat(document.getElementById('duty-cycle').value);
            const cycles = parseFloat(document.getElementById('cycles').value);
            const maxFreq = parseFloat(document.getElementById('max-freq').value);
            const xScale = document.getElementById('x-scale').value;
            const yScale = document.getElementById('y-scale').value;
            const showPhase = document.getElementById('show-phase').checked;
            setPlotMode(showPhase);
            clearPlotSync(['plot1', 'plot2', 'plot3']);

            const showAdvanced = document.getElementById('show-advanced').checked;
            const analysisType = showAdvanced ? document.getElementById('analysis-type').value : 'fourier';
            const windowType = document.getElementById('window-type').value;
            const continuousMode = showAdvanced && document.getElementById('continuous-mode').checked;

            const duration = cycles / frequency;
            const sampleRate = maxFreq * 10; // Sample at 10x max frequency

            // Generate first signal
            let {t: time, signal} = generateSignal(signalType, amplitude, offset, frequency, dutyCycle, duration, sampleRate);

            // Check if second signal is enabled
            const enableSignal2 = document.getElementById('enable-signal2').checked;
            if (enableSignal2) {
                const signalType2 = document.querySelector('input[name="signal-type2"]:checked').value;
                const amplitude2 = parseFloat(document.getElementById('amplitude2').value);
                const frequency2 = parseFloat(document.getElementById('frequency2').value);
                const dutyCycle2 = parseFloat(document.getElementById('duty-cycle2').value);
                
                // Generate second signal (no offset for second signal, it adds to the first)
                const {signal: signal2} = generateSignal(signalType2, amplitude2, 0, frequency2, dutyCycle2, duration, sampleRate);
                
                // Add second signal to first signal
                for (let i = 0; i < signal.length; i++) {
                    signal[i] += signal2[i];
                }
            }

            // Check if noise is enabled
            const enableNoise = document.getElementById('enable-noise').checked;
            if (enableNoise) {
                const noiseLevelMv = parseFloat(document.getElementById('noise-level').value);
                const noiseLevelV = noiseLevelMv / 1000; // Convert mV to V
                
                // Generate noise and add to signal
                const noise = generateNoise(signal.length, noiseLevelV);
                for (let i = 0; i < signal.length; i++) {
                    signal[i] += noise[i];
                }
            }

            let freqs, magnitudes, phases;
            const isFFT = analysisType === 'fft';

            if (isFFT) {
                // Apply window
                signal = applyWindow(signal, windowType);
                
                // Calculate FFT
                const fftResult = calculateFFT(signal, sampleRate, maxFreq);
                freqs = fftResult.freqs;
                magnitudes = fftResult.magnitudes;
                phases = fftResult.phases;
            } else {
                // Calculate Fourier series (original behavior)
                const fourierResult = calculateFourierSeries(signal, sampleRate, maxFreq, frequency);
                freqs = fourierResult.freqs;
                magnitudes = fourierResult.magnitudes;
                phases = fourierResult.phases;
            }

            const unwrappedPhases = unwrapPhase(phases);

            // Prepare magnitude data
            const magData = yScale === 'db' ? toDecibels(magnitudes, continuousMode) : magnitudes;
            const yAxisTitle = yScale === 'db' ? t.amplitude + ' (dB)' : t.amplitude + ' (V)';

            const styles = getComputedStyle(document.body);
            const plotBg = styles.getPropertyValue('--bg-secondary').trim();
            const gridColor = styles.getPropertyValue('--border-color').trim();
            const textColor = styles.getPropertyValue('--text-primary').trim();
            const timeColor = styles.getPropertyValue('--accent-color').trim();
            const magnitudeColor = '#2f80ed';
            const phaseColor = '#f59e0b';

            const layout = {
                paper_bgcolor: plotBg,
                plot_bgcolor: plotBg,
                font: {color: textColor},
                xaxis: {
                    gridcolor: gridColor,
                    type: xScale === 'log' ? 'log' : 'linear'
                },
                yaxis: {
                    gridcolor: gridColor
                },
                showlegend: false,
                margin: {l: 70, r: 30, t: 50, b: 60}
            };

            if (!showPhase) {
                // Plot 1: Time-domain signal
                const trace1 = {
                    x: time,
                    y: signal,
                    type: 'scatter',
                    mode: 'lines',
                    name: t.timeSignal,
                    line: {color: timeColor, width: 2}
                };

                const layout1 = {
                    ...layout,
                    title: t.timeSignal,
                    xaxis: {...layout.xaxis, title: t.time, type: 'linear'},
                    yaxis: {...layout.yaxis, title: t.amplitude + ' (V)'}
                };

                Plotly.newPlot('plot1', [trace1], layout1, {responsive: true});

                // Plot 2: Magnitude spectrum (stems)
                const trace2 = {
                    x: freqs,
                    y: magData,
                    type: 'scatter',
                    mode: (isFFT && continuousMode) ? 'lines' : 'markers',
                    name: t.magnitude,
                    marker: {
                        color: magnitudeColor,
                        size: 8,
                        symbol: 'circle'
                    },
                    line: {
                        color: magnitudeColor,
                        width: 2
                    }
                };

                // Add stems (only if not in continuous mode)
                const stemTraces = (isFFT && continuousMode) ? [] : freqs.map((f, i) => ({
                    x: [f, f],
                    y: [0, magData[i]],
                    type: 'scatter',
                    mode: 'lines',
                    line: {color: magnitudeColor, width: 2},
                    showlegend: false,
                    hoverinfo: 'skip',
                    visible: magData[i] !== null // Ocultar stem si el valor es null
                }));

                const layout2 = {
                    ...layout,
                    title: t.magnitude,
                    xaxis: {...layout.xaxis, title: t.frequency},
                    yaxis: {...layout.yaxis, title: yAxisTitle}
                };

                Plotly.newPlot('plot2', [trace2, ...stemTraces], layout2, {responsive: true});

            } else {
                // Plot 1: Time-domain signal in the left column
                const trace1 = {
                    x: time,
                    y: signal,
                    type: 'scatter',
                    mode: 'lines',
                    name: t.timeSignal,
                    line: {color: timeColor, width: 2}
                };

                const layout1 = {
                    ...layout,
                    title: t.timeSignal,
                    xaxis: {...layout.xaxis, title: t.time, type: 'linear'},
                    yaxis: {...layout.yaxis, title: t.amplitude + ' (V)'}
                };

                Plotly.newPlot('plot1', [trace1], layout1, {responsive: true});

                // Plot 2: Magnitude spectrum in the upper-right row
                const trace2 = {
                    x: freqs,
                    y: magData,
                    type: 'scatter',
                    mode: (isFFT && continuousMode) ? 'lines' : 'markers',
                    name: t.magnitude,
                    marker: {
                        color: magnitudeColor,
                        size: 8,
                        symbol: 'circle'
                    },
                    line: {
                        color: magnitudeColor,
                        width: 2
                    }
                };

                const stemTraces2 = (isFFT && continuousMode) ? [] : freqs.map((f, i) => ({
                    x: [f, f],
                    y: [0, magData[i]],
                    type: 'scatter',
                    mode: 'lines',
                    line: {color: magnitudeColor, width: 2},
                    showlegend: false,
                    hoverinfo: 'skip',
                    visible: magData[i] !== null // Ocultar stem si el valor es null
                }));

                const layout2 = {
                    ...layout,
                    title: t.magnitude,
                    xaxis: {...layout.xaxis, title: t.frequency},
                    yaxis: {...layout.yaxis, title: yAxisTitle}
                };

                Plotly.newPlot('plot2', [trace2, ...stemTraces2], layout2, {responsive: true});

                // Plot 3: Phase spectrum in the lower-right row
                const trace3 = {
                    x: freqs,
                    y: unwrappedPhases,
                    type: 'scatter',
                    mode: (isFFT && continuousMode) ? 'lines' : 'markers',
                    name: t.phase,
                    marker: {
                        color: phaseColor,
                        size: 8,
                        symbol: 'circle'
                    },
                    line: {
                        color: phaseColor,
                        width: 2
                    }
                };

                // Add stems (only if not in continuous mode)
                const stemTraces3 = (isFFT && continuousMode) ? [] : freqs.map((f, i) => ({
                    x: [f, f],
                    y: [0, unwrappedPhases[i]],
                    type: 'scatter',
                    mode: 'lines',
                    line: {color: phaseColor, width: 2},
                    showlegend: false,
                    hoverinfo: 'skip'
                }));

                const layout3 = {
                    ...layout,
                    title: t.phase,
                    xaxis: {...layout.xaxis, title: t.frequency},
                    yaxis: {...layout.yaxis, title: t.phaseUnit}
                };

                Plotly.newPlot('plot3', [trace3, ...stemTraces3], layout3, {responsive: true});
                linkSpectrumAxes();
            }
        }

        // Initial plot
        updatePlots();

        // Initialize language
        updateLanguage();

        // Initialize window group visibility
        document.getElementById('window-group').style.display = 'none';
        
        // Initialize continuous mode as disabled (only enabled for FFT)
        document.getElementById('continuous-mode').disabled = true;

        // Auto-update on any input change
        document.querySelectorAll('input, select').forEach(element => {
            if (element.id !== 'language' && element.id !== 'theme') {
                element.addEventListener('change', updatePlots);
            }
        });
    </script>
</body>
</html>
