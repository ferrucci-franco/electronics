<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Fourier Series (Complex) — 3D (Animated)</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/plotly.js/2.20.0/plotly.min.js"></script>
<style>
  :root{
    --bg:#ffffff; --fg:#0f172a; --panel:#f8fafc; --panel-border:#e5e7eb;
    --btn:#e2e8f0; --accent:#0ea5e9; --plot-bg:#ffffff; --plot-paper:#ffffff;
    --total-light:#111827; --total-dark:#9ca3af;
    --tab-active:#0ea5e9; --tab-inactive:#64748b;
  }
  .dark-mode{
    --bg:#0b0b0c; --fg:#f1f5f9; --panel:#151618; --panel-border:#2a2c30;
    --btn:#1f2937; --accent:#22d3ee; --plot-bg:#0b0b0c; --plot-paper:#0b0b0c;
    --tab-active:#22d3ee; --tab-inactive:#64748b;
  }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{
    margin:0; font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
    background:var(--bg); color:var(--fg);
    height:100vh; overflow:hidden;
    display:grid; grid-template-columns:340px 1fr; grid-template-rows:auto 1fr auto;
    grid-template-areas:"header header" "sidebar main" "sidebar controls";
  }
  body.sidebar-collapsed{ grid-template-columns:0 1fr; }

  header{
    grid-area:header; background:var(--panel); border-bottom:1px solid var(--panel-border);
    padding:10px 14px; display:flex; gap:10px; align-items:center; justify-content:space-between;
  }
  .title{margin:0; font-weight:700; font-size:1.05rem}
  .toolbar{display:flex; gap:8px; align-items:center; flex-wrap:wrap}
  button,select,label{font-size:0.95rem}
  button{
    background:var(--btn); color:var(--fg); border:1px solid var(--panel-border);
    border-radius:10px; padding:8px 12px; cursor:pointer;
  }
  button:hover{border-color:var(--accent)}
  button.active{ background:var(--accent); color:white; border-color:var(--accent); }
  button:disabled{ opacity: 0.5; cursor: not-allowed; }

  #sidebar{
    grid-area:sidebar; background:var(--panel); border-right:1px solid var(--panel-border);
    display:flex; flex-direction:column; gap:10px; padding:12px; overflow-y:auto; width:340px;
  }
  body.sidebar-collapsed #sidebar{ display:none; }

  .presets{display:flex; gap:6px; flex-wrap:wrap}
  .toggles{display:flex; gap:12px; align-items:center; flex-wrap:wrap; margin-top:6px}
  
  /* Tabs */
  .tabs-container{margin-top:10px}
  .tabs-header{display:flex; border-bottom:2px solid var(--panel-border); background:var(--panel)}
  .tab-button{
    background:var(--panel-border); border:none; padding:12px 20px; cursor:pointer;
    color:var(--fg); border-bottom:3px solid transparent;
    font-size:0.9rem; font-weight:500; transition:all 0.2s ease;
    border-top-left-radius:8px; border-top-right-radius:8px;
    margin-right:2px; border:1px solid var(--panel-border);
  }
  .tab-button.active{
    color:var(--fg); border-bottom-color:var(--accent);
    background:var(--accent); font-weight:700; color:white;
    border-color:var(--accent);
  }
  .tab-button:hover:not(.active){
    background:var(--btn); transform:translateY(-1px);
  }
  
  .tab-content{display:none; padding:12px 0; background:var(--bg); border-radius:0 0 8px 8px}
  .tab-content.active{display:block}
  
  .control-grid{display:grid; gap:10px; grid-template-columns:1fr}
  .control-card{background:var(--bg); border:1px solid var(--panel-border); border-radius:12px; padding:10px}
  .row2{display:grid; gap:6px}
  .row2 label{display:flex; justify-content:space-between; align-items:center; font-size:0.85rem; gap:8px; flex-wrap:wrap}
  input[type="range"]{width:100%}
  input[type="range"]:disabled{ opacity: 0.5; cursor: not-allowed; }

  /* Editable labels & numeric inputs */
  .editable-label{
    padding:2px 6px; border-radius:4px; max-width:64%;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  }
  .editable-label:focus{ outline:1px dashed var(--accent); background:rgba(14,165,233,0.08); }
  .value-input{ width:96px; padding:6px 8px; border-radius:8px; border:1px solid var(--panel-border); background:var(--bg); color:var(--fg); }

  #main{grid-area:main; padding:4px; display:flex; flex-direction:column; overflow:hidden}
  #plot3d{flex:1; min-height:500px}
  
  /* Animation Controls */
  #animationControls{
    grid-area:controls; background:var(--panel); border-top:1px solid var(--panel-border);
    padding:12px 14px; display:flex; gap:12px; align-items:center; flex-wrap:wrap;
  }
  body.sidebar-collapsed #animationControls{ padding-left:14px; }
  
  .animation-toggle{
    display:flex; gap:8px; align-items:center;
  }
  
  .time-control{
    display:flex; gap:8px; align-items:center; flex:1; min-width:300px;
  }
  
  #timeSlider{
    flex:1; min-width:200px;
  }
  
  .time-display{
    font-family:monospace; font-size:0.9rem; color:var(--fg);
    min-width:120px; text-align:center; padding:4px 8px;
    background:var(--bg); border:1px solid var(--panel-border); border-radius:6px;
  }
  .time-display.disabled{ opacity: 0.5; }
  
  .speed-control{
    display:flex; gap:6px; align-items:center; font-size:0.85rem;
  }
  .speed-control label{
    white-space:nowrap; color:var(--fg);
  }
  #speedSlider{
    width:80px;
  }
  
  @media (max-width:900px){
    body{
      grid-template-columns:1fr; grid-template-rows:auto auto 1fr auto;
      grid-template-areas:"header" "sidebar" "main" "controls";
    }
    body.sidebar-collapsed{ grid-template-rows:auto 1fr auto; grid-template-areas:"header" "main" "controls"; }
    #sidebar{max-height:45vh}
    #main{min-height:35vh}
    .time-control{min-width:250px}
  }
</style>
</head>
<body>
  <header>
    <h1 class="title" id="mainTitle">Fourier Series (Complex) — 3D (Animated)</h1>
    <div class="toolbar">
      <select id="languageSelector" aria-label="Language">
        <option value="en" selected>English</option>
        <option value="es">Español</option>
        <option value="fr">Français</option>
      </select>
      <button id="toggleTheme">Dark Mode</button>
      <button id="toggleSidebar">Hide Controls</button>
    </div>
  </header>

  <aside id="sidebar">
    <div class="presets" style="margin-bottom:6px">
      <button id="presetSquare">Square</button>
      <button id="presetTriangle">Triangle</button>
      <button id="presetAll0">All 0</button>
      <button id="presetZeroNegZeroPos">0, −1, 0, +1</button>
      <button id="presetFlower">Flower</button>
      <button id="presetPentagon">Pentagon</button>
      <button id="presetLissajous">Lissajous</button>
    </div>
    <div class="toggles">
      <label><input type="checkbox" id="showComponents" checked /> <span id="labelShowComponents">Show Components</span></label>
      <label><input type="checkbox" id="showPhasors" checked /> <span id="labelShowPhasors">Show Phasors</span></label>
      <label><input type="checkbox" id="chainedComponents" /> <span id="labelChainedComponents">Chained Components</span></label>
    </div>
    
    <div class="tabs-container">
      <div class="tabs-header">
        <button class="tab-button active" data-tab="positive" id="tabPositive">k ≥ 0</button>
        <button class="tab-button" data-tab="negative" id="tabNegative">k &lt; 0</button>
      </div>
      <div class="tab-content active" id="tabContentPositive">
        <div class="control-grid" id="controlsGridPositive"></div>
      </div>
      <div class="tab-content" id="tabContentNegative">
        <div class="control-grid" id="controlsGridNegative"></div>
      </div>
    </div>
  </aside>

  <main id="main">
    <div class="toolbar" style="margin:4px 6px">
      <button id="viewReal">Real</button>
      <button id="viewImag">Imag</button>
      <button id="viewPlane">Complex plane</button>
      <button id="view3D">3D</button>
    </div>
    <div id="plot3d"></div>
  </main>

  <div id="animationControls">
    <div class="animation-toggle">
      <label><input type="checkbox" id="animationEnabled" /> <span id="labelAnimationOn">Animation on</span></label>
    </div>
    <button id="resetBtn">Reset</button>
    <button id="playPauseBtn">▶ Play</button>
    <div class="time-control">
      <input type="range" id="timeSlider" min="0" max="12.566" step="0.01" value="0" />
      <div class="time-display" id="timeDisplay">t = 0.00 rad</div>
    </div>
    <div class="speed-control">
      <label id="labelSpeed">Speed:</label>
      <input type="range" id="speedSlider" min="5" max="60" step="1" value="60" />
    </div>
  </div>

<script>
/* ================= CONFIG ================= */
const N_HARMONICS = 10;
const N_PERIODS = 2;
const POINTS_PER_PERIOD = 300;
const OMEGA0 = 1;
const RAD = Math.PI/180;

/* Line widths */
const LINE_WIDTH_COMPONENT = 2;
const LINE_WIDTH_TOTAL = 6;
const LINE_WIDTH_PHASOR = 3;

/* ðŸŽ¨ Colores para componentes y fasores */
const COLORS = [
  "#1f77b4","#ff7f0e","#2ca02c","#d62728","#9467bd",
  "#8c564b","#e377c2","#7f7f7f","#bcbd22","#17becf"
];
function getColorForHarmonic(k) {
  var baseColor = COLORS[Math.abs(k) % COLORS.length];
  if (k < 0) {
    var hex = baseColor.replace('#', '');
    var r = parseInt(hex.substr(0, 2), 16);
    var g = parseInt(hex.substr(2, 2), 16);
    var b = parseInt(hex.substr(4, 2), 16);
    var newR = Math.round(r * 0.7 + 255 * 0.3);
    var newG = Math.round(g * 0.7 + 255 * 0.3);
    var newB = Math.round(b * 0.7 + 255 * 0.3);
    return "rgb(" + newR + ", " + newG + ", " + newB + ")";
  }
  return baseColor;
}

/* ================= ANIMATION STATE ================= */
let animationState = {
  isPlaying: false,
  currentTime: 0,
  maxTime: 2 * Math.PI * N_PERIODS,
  animationId: null,
  userControlling: false,
  startTimestamp: null,
  pausedAt: 0,
  enabled: false,  // Animation starts disabled
  cycleDuration: 5000  // Animation duration in milliseconds (5 seconds default)
};

/* ================= i18n ================= */
const tr = {
  en:{ title:"Fourier Series (Complex) — 3D (Animated)", magnitude:"Magnitude", phase:"Phase",
       darkMode:"Dark Mode", lightMode:"Light Mode", hideControls:"Hide Controls", showControls:"Show Controls",
       showComponents:"Show Components", showPhasors:"Show Phasors", chainedComponents:"Chained Components",
       viewReal:"Real", viewImag:"Imag.", viewPlane:"Complex plane", view3D:"3D",
       square:"Square", triangle:"Triangle", all0:"All 0", zeroNegZeroPos:"0, −1, 0, +1", flower:"Flower", pentagon:"Pentagon", lissajous:"Lissajous",
       axisX:"Time (rad)", axisY:"Real", axisZ:"Imag", total:"Total",
       tabPositive:"k ≥ 0", tabNegative:"k < 0", 
       play:"▶ Play", pause:"⏸ Pause", reset:"Reset", animationOn:"Animation on", speed:"Speed" },
  es:{ title:"Serie de Fourier (Compleja) — 3D (Animada)", magnitude:"Módulo", phase:"Fase",
       darkMode:"Modo oscuro", lightMode:"Modo claro", hideControls:"Ocultar controles", showControls:"Mostrar controles",
       showComponents:"Mostrar componentes", showPhasors:"Mostrar fasores", chainedComponents:"Componentes encadenados",
       viewReal:"Real", viewImag:"Imag.", viewPlane:"Plano complejo", view3D:"3D",
       square:"Cuadrada", triangle:"Triangular", all0:"Todo 0", zeroNegZeroPos:"0, −1, 0, +1", flower:"Flor", pentagon:"Pentágono", lissajous:"Lissajous",
       axisX:"Tiempo (rad)", axisY:"Real", axisZ:"Imaginaria", total:"Total",
       tabPositive:"k ≥ 0", tabNegative:"k < 0",
       play:"▶ Reproducir", pause:"⏸ Pausar", reset:"Reiniciar", animationOn:"Animación activada", speed:"Velocidad" },
  fr:{ title:"Série de Fourier (Complexe) — 3D (Animée)", magnitude:"Module", phase:"Phase",
       darkMode:"Mode sombre", lightMode:"Mode clair", hideControls:"Masquer contrôles", showControls:"Afficher contrôles",
       showComponents:"Afficher composantes", showPhasors:"Afficher des phaseurs", chainedComponents:"Composantes chaînées",
       viewReal:"Réel", viewImag:"Imag.", viewPlane:"Plan complexe", view3D:"3D",
       square:"Carrée", triangle:"Triangulaire", all0:"Tout 0", zeroNegZeroPos:"0, −1, 0, +1", flower:"Fleur", pentagon:"Pentagone", lissajous:"Lissajous",
       axisX:"Temps (rad)", axisY:"Réel", axisZ:"Imaginaire", total:"Total",
       tabPositive:"k ≥ 0", tabNegative:"k < 0",
       play:"▶ Jouer", pause:"⏸ Pause", reset:"Réinitialiser", animationOn:"Animation activée", speed:"Vitesse" }
};
let lang="en";

/* ================= STATE ================= */
const coefficients = {};
for(let k = -N_HARMONICS; k <= N_HARMONICS; k++){
  coefficients[k] = { magnitude: (k === 1 ? 1 : 0), phase: 0 };
}

/* Etiquetas personalizadas */
const customLabels = {};
function getDefaultLabel(type, k){
  if(type === 'amp') return `${tr[lang].magnitude} |c<sub>${k}</sub>|`;
  return `${tr[lang].phase} φ<sub>${k}</sub> (deg)`;
}
function getLabelText(type, k){
  const key = `${k}:${type}`;
  return (customLabels[key] ?? getDefaultLabel(type, k));
}
function setCustomLabel(type, k, text){
  const key = `${k}:${type}`;
  const t = (text || '').trim();
  if(t && t !== getDefaultLabel(type, k)) customLabels[key] = t;
  else delete customLabels[key];
}

let darkMode=false, sidebarHidden=false;
let initialized=false;
let activeTab = "positive";
let cachedMaxAmp = null; // Cache for max amplitude to ensure consistent axis limits

/* Time vector (will be computed based on current time for animation) */
const totalPoints = N_PERIODS*POINTS_PER_PERIOD + 1;

/* rAF throttle */
let rafPending=false;
function scheduleUpdate(){ 
  if(rafPending) return; 
  rafPending=true; 
  requestAnimationFrame(()=>{ 
    cachedMaxAmp = null; // Invalidate cache when coefficients change
    updatePlot(true); 
    rafPending=false; 
  }); 
}

/* ================= ANIMATION CONTROL FUNCTIONS ================= */
function updateAnimationControlsState() {
  const enabled = animationState.enabled;
  const resetBtn = document.getElementById('resetBtn');
  const playPauseBtn = document.getElementById('playPauseBtn');
  const timeSlider = document.getElementById('timeSlider');
  const timeDisplay = document.getElementById('timeDisplay');
  
  resetBtn.disabled = !enabled;
  playPauseBtn.disabled = !enabled;
  timeSlider.disabled = !enabled;
  
  if (enabled) {
    timeDisplay.classList.remove('disabled');
  } else {
    timeDisplay.classList.add('disabled');
    // When disabled, pause any running animation
    if (animationState.isPlaying) {
      pauseAnimation();
    }
  }
}

/* ================= ANIMATION FUNCTIONS ================= */
function resetAnimation() {
  if (!animationState.enabled) return;
  
  if (animationState.animationId) {
    cancelAnimationFrame(animationState.animationId);
  }
  animationState.isPlaying = false;
  animationState.currentTime = 0;
  animationState.animationId = null;
  animationState.startTimestamp = null;
  animationState.pausedAt = 0;
  animationState.userControlling = false;
  
  updateTimeDisplay();
  updatePlayPauseButton();
  updateTimeSlider();
  updatePlot(true);
}

function togglePlayPause() {
  if (!animationState.enabled) return;
  
  if (animationState.isPlaying) {
    pauseAnimation();
  } else {
    startAnimation();
  }
}

function startAnimation() {
  if (!animationState.enabled) return;
  
  if (animationState.currentTime >= animationState.maxTime) {
    animationState.currentTime = 0;
  }
  
  animationState.isPlaying = true;
  animationState.startTimestamp = null;
  animationState.pausedAt = animationState.currentTime;
  updatePlayPauseButton();
  animationState.animationId = requestAnimationFrame(animationLoop);
}

function pauseAnimation() {
  if (animationState.animationId) {
    cancelAnimationFrame(animationState.animationId);
  }
  animationState.isPlaying = false;
  animationState.animationId = null;
  updatePlayPauseButton();
}

function animationLoop(timestamp) {
  if (!animationState.enabled) return;
  
  if (!animationState.startTimestamp) {
    animationState.startTimestamp = timestamp;
  }
  
  // Use cycleDuration from animationState
  const elapsed = timestamp - animationState.startTimestamp;
  const cycleDuration = animationState.cycleDuration;
  const progress = (elapsed / cycleDuration) % 1;
  
  animationState.currentTime = animationState.pausedAt + (progress * animationState.maxTime);
  
  if (animationState.currentTime >= animationState.maxTime) {
    animationState.currentTime = animationState.maxTime;
    pauseAnimation(); // Stop at end
  }
  
  updateTimeDisplay();
  updateTimeSlider();
  updatePlot(true);
  
  if (animationState.isPlaying) {
    animationState.animationId = requestAnimationFrame(animationLoop);
  }
}

function setTime(time) {
  if (!animationState.enabled) return;
  
  animationState.currentTime = Math.max(0, Math.min(time, animationState.maxTime));
  updateTimeDisplay();
  updateTimeSlider();
  updatePlot(true);
}

function updateTimeDisplay() {
  const timeDisplay = document.getElementById('timeDisplay');
  if (animationState.enabled) {
    timeDisplay.textContent = `t = ${animationState.currentTime.toFixed(2)} rad`;
  } else {
    timeDisplay.textContent = `t = 0.00 rad`;
  }
}

function updateTimeSlider() {
  if (!animationState.userControlling && animationState.enabled) {
    const slider = document.getElementById('timeSlider');
    slider.value = animationState.currentTime.toFixed(2);
  }
}

function updatePlayPauseButton() {
  const btn = document.getElementById('playPauseBtn');
  if (animationState.isPlaying) {
    btn.textContent = tr[lang].pause;
    btn.classList.add('active');
  } else {
    btn.textContent = tr[lang].play;
    btn.classList.remove('active');
  }
}

/* ================= UI STATE MANAGEMENT ================= */
function updateShowComponentsState() {
  const chainedComponents = document.getElementById("chainedComponents").checked;
  const showComponentsCheckbox = document.getElementById("showComponents");
  const showComponentsLabel = document.getElementById("labelShowComponents");
  
  if(chainedComponents) {
    showComponentsCheckbox.disabled = true;
    showComponentsLabel.style.opacity = "0.5";
  } else {
    showComponentsCheckbox.disabled = false;
    showComponentsLabel.style.opacity = "1";
  }
}

/* ================= UI ================= */
function buildControls(){
  buildControlsForTab("positive");
  buildControlsForTab("negative");
}

function buildControlsForTab(tab){
  const isPositive = tab === "positive";
  const grid = document.getElementById(isPositive ? "controlsGridPositive" : "controlsGridNegative");
  grid.innerHTML = "";
  
  const kValues = isPositive ? 
    Array.from({length: N_HARMONICS + 1}, (_, i) => i) : 
    Array.from({length: N_HARMONICS}, (_, i) => -(i + 1));
  
  for(const k of kValues){
    const card  = document.createElement("div"); 
    card.className = "control-card";
    const inner = document.createElement("div"); 
    inner.className = "row2";

    // ====== MÃ"DULO ======
    const labAmp = document.createElement("label");

    const labelAmpEditable = document.createElement("span");
    labelAmpEditable.className = "editable-label";
    labelAmpEditable.contentEditable = "true";
    labelAmpEditable.spellcheck = false;
    labelAmpEditable.innerHTML = getLabelText('amp', k);

    const commitAmpLabel = () => setCustomLabel('amp', k, labelAmpEditable.textContent);
    labelAmpEditable.addEventListener('blur', commitAmpLabel);
    labelAmpEditable.addEventListener('keydown', (ev)=>{
      if(ev.key === 'Enter'){
        ev.preventDefault(); labelAmpEditable.blur();
      }
    });

    const inputAmp = document.createElement("input");
    inputAmp.type = "number";
    inputAmp.className = "value-input";
    inputAmp.step = "0.01";
    inputAmp.value = coefficients[k].magnitude.toFixed(2);
    inputAmp.title = "Magnitude (can be > 2)";

    const sliderAmp = document.createElement("input");
    sliderAmp.type = "range"; sliderAmp.min = "0"; sliderAmp.max = "2";
    sliderAmp.step = "0.01";
    sliderAmp.value = String(Math.min(coefficients[k].magnitude, 2));

    sliderAmp.addEventListener("input", function(){
      const v = parseFloat(sliderAmp.value);
      coefficients[k].magnitude = v;
      inputAmp.value = coefficients[k].magnitude.toFixed(2);
      scheduleUpdate();
    });

    inputAmp.addEventListener("change", function(){
      let v = parseFloat(inputAmp.value);
      if(!isFinite(v)) v = 0;
      coefficients[k].magnitude = v;
      const sliderMax = parseFloat(sliderAmp.max);
      sliderAmp.value = String(Math.min(v, sliderMax));
      scheduleUpdate();
    });

    labAmp.appendChild(labelAmpEditable);
    labAmp.appendChild(inputAmp);

    // ====== FASE ======
    const labPh = document.createElement("label");

    const labelPhEditable = document.createElement("span");
    labelPhEditable.className = "editable-label";
    labelPhEditable.contentEditable = "true";
    labelPhEditable.spellcheck = false;
    labelPhEditable.innerHTML = getLabelText('ph', k);

    const commitPhLabel = () => setCustomLabel('ph', k, labelPhEditable.textContent);
    labelPhEditable.addEventListener('blur', commitPhLabel);
    labelPhEditable.addEventListener('keydown', (ev)=>{
      if(ev.key === 'Enter'){
        ev.preventDefault(); labelPhEditable.blur();
      }
    });

    const inputPh = document.createElement("input");
    inputPh.type = "number";
    inputPh.className = "value-input";
    inputPh.step = "1";
    inputPh.value = (coefficients[k].phase / RAD).toFixed(0);
    inputPh.title = "Phase (deg)";

    const sliderPh = document.createElement("input");
    sliderPh.type = "range"; 
    sliderPh.min = "-180"; sliderPh.max = "180"; sliderPh.step = "1";
    sliderPh.value = String((coefficients[k].phase / RAD).toFixed(0));

    sliderPh.addEventListener("input", function(){
      const deg = parseFloat(sliderPh.value);
      coefficients[k].phase = deg * RAD;
      inputPh.value = String(deg.toFixed(0));
      scheduleUpdate();
    });

    inputPh.addEventListener("change", function(){
      let deg = parseFloat(inputPh.value);
      if(!isFinite(deg)) deg = 0;
      coefficients[k].phase = deg * RAD;
      let sdeg = ((deg + 180) % 360 + 360) % 360 - 180;
      sliderPh.value = String(sdeg.toFixed(0));
      scheduleUpdate();
    });

    labPh.appendChild(labelPhEditable);
    labPh.appendChild(inputPh);

    inner.appendChild(labAmp);
    inner.appendChild(sliderAmp);
    inner.appendChild(labPh);
    inner.appendChild(sliderPh);
    card.appendChild(inner);
    grid.appendChild(card);
  }
}

/* ================= TABS ================= */
function switchTab(tabName){
  activeTab = tabName;
  document.querySelectorAll('.tab-button').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.tab === tabName);
  });
  document.querySelectorAll('.tab-content').forEach(content => {
    content.classList.toggle('active', content.id === `tabContent${tabName.charAt(0).toUpperCase() + tabName.slice(1)}`);
  });
}

/* ================= PRESETS ================= */
function resetAllCoefficients(){
  for(let k = -N_HARMONICS; k <= N_HARMONICS; k++){
    coefficients[k] = { magnitude: 0, phase: 0 };
  }
}

function applyPresetSquare(){
  resetAllCoefficients();
  for(let k = 1; k <= N_HARMONICS; k++){
    if (k % 2 === 1){
      const bk = 4/(Math.PI*k);
      const A  = Math.abs(bk)/2;
      const s  = Math.sign(bk);
      coefficients[+k].magnitude = A;
      coefficients[+k].phase     = -s * Math.PI/2;
      coefficients[-k].magnitude = A;
      coefficients[-k].phase     = +s * Math.PI/2;
    }
  }
  coefficients[0].magnitude = 0;
  coefficients[0].phase = 0;
  buildControls(); 
  scheduleUpdate();
}

function applyPresetTriangle(){
  resetAllCoefficients();
  for(let k = 1; k <= N_HARMONICS; k++){
    if (k % 2 === 1){
      const signAlt = Math.pow(-1, (k-1)/2);
      const bk = 8 * signAlt / (Math.PI*Math.PI * k * k);
      const A  = Math.abs(bk)/2;
      const s  = Math.sign(bk);
      coefficients[+k].magnitude = A;
      coefficients[+k].phase     = -s * Math.PI/2;
      coefficients[-k].magnitude = A;
      coefficients[-k].phase     = +s * Math.PI/2;
    }
  }
  coefficients[0].magnitude = 0;
  coefficients[0].phase = 0;
  buildControls(); 
  scheduleUpdate();
}

function applyPresetAll(){
  resetAllCoefficients();
  resetAnimation();
  buildControls(); 
  scheduleUpdate();
}

function applyPresetZeroNegZeroPos(){
  resetAllCoefficients();
  const S = 4096; 
  const dt = (2*Math.PI)/S;
  const f = new Array(S);
  for(let i = 0; i < S; i++){
    const t = i * dt;
    if (t < Math.PI/2) f[i] = 0;
    else if (t < Math.PI) f[i] = -1;
    else if (t < 3*Math.PI/2) f[i] = 0;
    else f[i] = 1;
  }
  
  for(let k = -N_HARMONICS; k <= N_HARMONICS; k++){
    if(k === 0){
      let sum = 0; for(let i = 0; i < S; i++) sum += f[i];
      coefficients[k].magnitude = Math.abs(sum * dt / (2 * Math.PI));
      coefficients[k].phase = 0;
    } else {
      let realPart = 0, imagPart = 0;
      for(let i = 0; i < S; i++){
        const t = i * dt;
        realPart += f[i] * Math.cos(-k * OMEGA0 * t);
        imagPart += f[i] * Math.sin(-k * OMEGA0 * t);
      }
      realPart = (realPart * dt) / (2 * Math.PI);
      imagPart = (imagPart * dt) / (2 * Math.PI);
      coefficients[k].magnitude = Math.hypot(realPart, imagPart);
      coefficients[k].phase = Math.atan2(imagPart, realPart);
    }
  }
  resetAnimation();
  buildControls(); 
  scheduleUpdate();
}

function applyPresetFlower(){
  resetAllCoefficients();
  const n = 5;
  const eps = 0.35;

  if (coefficients[1] !== undefined){
    coefficients[1].magnitude = 1; coefficients[1].phase = 0;
  }
  const k1 = n + 1, k2 = 1 - n, A = eps/2;
  if (coefficients[k1] !== undefined){
    coefficients[k1].magnitude = A; coefficients[k1].phase = 0;
  }
  if (coefficients[k2] !== undefined){
    coefficients[k2].magnitude = A; coefficients[k2].phase = 0;
  }
  resetAnimation();
  buildControls();
  scheduleUpdate();
}

function applyPresetPentagon(){
  resetAllCoefficients();
  
  const pentagonCoeffs = [
    { k: -19, magnitude: 0.002424, phase: 0 },
    { k: -14, magnitude: 0.004465, phase: 0 },
    { k: -9,  magnitude: 0.010804, phase: 0 },
    { k: -4,  magnitude: 0.054696, phase: 0 },
    { k: 1,   magnitude: 0.875140, phase: 0 },
    { k: 6,   magnitude: 0.024309, phase: 0 },
    { k: 11,  magnitude: 0.007233, phase: 0 },
    { k: 16,  magnitude: 0.003419, phase: 0 }
  ];
  
  for (const coeff of pentagonCoeffs) {
    if (coefficients[coeff.k] !== undefined) {
      coefficients[coeff.k].magnitude = coeff.magnitude;
      coefficients[coeff.k].phase = coeff.phase * Math.PI / 180;
    }
  }
  
  resetAnimation();
  buildControls();
  scheduleUpdate();
}

function applyPresetLissajous(){
  resetAllCoefficients();
  const a = 2, b = 3;
  if (coefficients[a] !== undefined){ coefficients[a].magnitude = 0.5; coefficients[a].phase = 0; }
  if (coefficients[-a] !== undefined){ coefficients[-a].magnitude = 0.5; coefficients[-a].phase = 0; }
  if (coefficients[b] !== undefined){ coefficients[b].magnitude = 0.5; coefficients[b].phase = 0; }
  if (coefficients[-b] !== undefined){ coefficients[-b].magnitude = 0.5; coefficients[-b].phase = Math.PI; }
  coefficients[0].magnitude = 0; coefficients[0].phase = 0;
  resetAnimation();
  buildControls();
  scheduleUpdate();
}

/* ================= COMPUTE ================= */
function computeMaxAmplitude() {
  // Always compute max amplitude based on complete series for consistent scaling
  const fullTimePoints = totalPoints;
  const fullTvec = Array.from({length: fullTimePoints}, (_, i) => i * animationState.maxTime / (fullTimePoints - 1));
  
  let maxAmp = 0;
  
  const chainedComponents = document.getElementById("chainedComponents").checked;
  
  if (chainedComponents) {
    // Simulate chained components to get accurate bounds
    function getProgressiveOrder() {
      const order = [];
      const nonZeroCoeffs = [];
      
      for(let k = -N_HARMONICS; k <= N_HARMONICS; k++){
        if(coefficients[k].magnitude > 0) {
          nonZeroCoeffs.push(k);
        }
      }
      
      if(nonZeroCoeffs.includes(0)) order.push(0);
      for(let i = 1; i <= N_HARMONICS; i++) {
        if(nonZeroCoeffs.includes(i)) order.push(i);
        if(nonZeroCoeffs.includes(-i)) order.push(-i);
      }
      
      return order;
    }
    
    const kOrder = getProgressiveOrder();
    const individualComponents = [];
    const sumRe = new Float64Array(fullTimePoints);
    const sumIm = new Float64Array(fullTimePoints);
    
    // Calculate all individual components
    for(const k of kOrder) {
      const A = coefficients[k].magnitude;
      const phi = coefficients[k].phase;
      const re = new Float64Array(fullTimePoints);
      const im = new Float64Array(fullTimePoints);
      
      for(let i = 0; i < fullTimePoints; i++){
        const th = k * OMEGA0 * fullTvec[i] + phi;
        re[i] = A * Math.cos(th);
        im[i] = A * Math.sin(th);
        sumRe[i] += re[i];
        sumIm[i] += im[i];
      }
      
      individualComponents.push({k, re, im});
    }
    
    // Check max from total sum
    for(let i = 0; i < fullTimePoints; i++){
      maxAmp = Math.max(maxAmp, Math.abs(sumRe[i]), Math.abs(sumIm[i]));
    }
    
    // Now apply chaining and find max from translated components
    let offsetRe = 0, offsetIm = 0;
    
    for(let idx = 0; idx < individualComponents.length; idx++) {
      const comp = individualComponents[idx];
      
      for(let i = 0; i < fullTimePoints; i++){
        const translatedRe = comp.re[i] + offsetRe;
        const translatedIm = comp.im[i] + offsetIm;
        maxAmp = Math.max(maxAmp, Math.abs(translatedRe), Math.abs(translatedIm));
      }
      
      const lastIdx = fullTimePoints - 1;
      offsetRe += comp.re[lastIdx];
      offsetIm += comp.im[lastIdx];
    }
    
  } else {
    // Original calculation for non-chained mode
    // Calculate max amplitude from all components
    for(let k = -N_HARMONICS; k <= N_HARMONICS; k++){
      const A = coefficients[k].magnitude;
      maxAmp = Math.max(maxAmp, A);
    }
    
    // Also check the total sum at various time points
    for(let i = 0; i < fullTimePoints; i += Math.floor(fullTimePoints / 100)) {
      let sumRe = 0, sumIm = 0;
      for(let k = -N_HARMONICS; k <= N_HARMONICS; k++){
        const A = coefficients[k].magnitude;
        const phi = coefficients[k].phase;
        const th = k * OMEGA0 * fullTvec[i] + phi;
        sumRe += A * Math.cos(th);
        sumIm += A * Math.sin(th);
      }
      maxAmp = Math.max(maxAmp, Math.abs(sumRe), Math.abs(sumIm));
    }
  }
  
  return Math.max(1, maxAmp * 1.1);
}

function computeData(){
  const showComps = document.getElementById("showComponents").checked;
  const chainedComponents = document.getElementById("chainedComponents").checked;
  
  // Get fixed max amplitude for consistent scaling (use cache if available)
  if (cachedMaxAmp === null) {
    cachedMaxAmp = computeMaxAmplitude();
  }
  const maxAmp = cachedMaxAmp;
  
  // Determine time vector based on animation mode
  let timePoints, tvec;
  if (animationState.enabled) {
    // Animation mode: generate time vector up to current animation time
    timePoints = Math.max(1, Math.floor((animationState.currentTime / animationState.maxTime) * totalPoints));
    if (timePoints === 1) {
      tvec = [animationState.currentTime];
    } else {
      tvec = Array.from({length: timePoints}, (_, i) => i * animationState.currentTime / (timePoints - 1));
    }
  } else {
    // Static mode: generate complete time vector
    timePoints = totalPoints;
    tvec = Array.from({length: timePoints}, (_, i) => i * animationState.maxTime / (timePoints - 1));
  }
  
  const sumRe = new Float64Array(timePoints);
  const sumIm = new Float64Array(timePoints);
  const components = [];
  const translatedComponents = [];
  
  function getProgressiveOrder() {
    const order = [];
    const nonZeroCoeffs = [];
    
    for(let k = -N_HARMONICS; k <= N_HARMONICS; k++){
      if(coefficients[k].magnitude > 0) {
        nonZeroCoeffs.push(k);
      }
    }
    
    if(nonZeroCoeffs.includes(0)) order.push(0);
    for(let i = 1; i <= N_HARMONICS; i++) {
      if(nonZeroCoeffs.includes(i)) order.push(i);
      if(nonZeroCoeffs.includes(-i)) order.push(-i);
    }
    
    return order;
  }
  
  if(chainedComponents) {
    const kOrder = getProgressiveOrder();
    
    const individualComponents = [];
    for(const k of kOrder) {
      const A = coefficients[k].magnitude;
      const phi = coefficients[k].phase;
      const re = new Float64Array(timePoints);
      const im = new Float64Array(timePoints);
      
      for(let i = 0; i < timePoints; i++){
        const th = k * OMEGA0 * tvec[i] + phi;
        re[i] = A * Math.cos(th);
        im[i] = A * Math.sin(th);
        sumRe[i] += re[i];
        sumIm[i] += im[i];
      }
      
      individualComponents.push({k, re, im});
    }
    
    let offsetRe = 0, offsetIm = 0;
    
    for(let idx = 0; idx < individualComponents.length; idx++) {
      const comp = individualComponents[idx];
      const translatedRe = new Float64Array(timePoints);
      const translatedIm = new Float64Array(timePoints);
      
      for(let i = 0; i < timePoints; i++){
        translatedRe[i] = comp.re[i] + offsetRe;
        translatedIm[i] = comp.im[i] + offsetIm;
      }
      
      translatedComponents.push({
        k: comp.k,
        re: translatedRe,
        im: translatedIm,
        tvec: tvec
      });
      
      const lastIdx = timePoints - 1;
      offsetRe += comp.re[lastIdx];
      offsetIm += comp.im[lastIdx];
    }
    
  } else {
    if(showComps){
      for(let k = -N_HARMONICS; k <= N_HARMONICS; k++){
        if(coefficients[k].magnitude === 0) continue;
        const A = coefficients[k].magnitude;
        const phi = coefficients[k].phase;
        const re = new Float64Array(timePoints);
        const im = new Float64Array(timePoints);
        for(let i = 0; i < timePoints; i++){
          const th = k * OMEGA0 * tvec[i] + phi;
          re[i] = A * Math.cos(th);
          im[i] = A * Math.sin(th);
          sumRe[i] += re[i];
          sumIm[i] += im[i];
        }
        components.push({k, re, im, tvec});
      }
    } else {
      for(let k = -N_HARMONICS; k <= N_HARMONICS; k++){
        const A = coefficients[k].magnitude;
        const phi = coefficients[k].phase;
        for(let i = 0; i < timePoints; i++){
          const th = k * OMEGA0 * tvec[i] + phi;
          sumRe[i] += A * Math.cos(th);
          sumIm[i] += A * Math.sin(th);
        }
      }
    }
  }
  
  return {sumRe, sumIm, components, maxAmp, translatedComponents, tvec, timePoints};
}

/* ================= PLOT ================= */
const INITIAL_CAMERA = {
  eye:{x:1.8, y:-1.8, z:1.2},
  up: {x:0, y:0, z:1},
  projection:{type:"orthographic"}
};

function layoutWithCamera(includeCamera=false, maxAmp=1){
  const layout = {
    uirevision: "keep-camera",
    margin:{l:0, r:0, b:0, t:0},
    scene:{
      xaxis:{
        title:tr[lang].axisX, 
        zeroline:false, 
        backgroundcolor:getComputedStyle(document.body).getPropertyValue('--plot-bg').trim(), 
        range:[0, animationState.maxTime],
        autorange: false,
        fixedrange: true
      },
      yaxis:{
        title:tr[lang].axisY, 
        zeroline:false, 
        backgroundcolor:getComputedStyle(document.body).getPropertyValue('--plot-bg').trim(), 
        range:[-maxAmp, maxAmp],
        autorange: false,
        fixedrange: true
      },
      zaxis:{
        title:tr[lang].axisZ, 
        zeroline:false, 
        backgroundcolor:getComputedStyle(document.body).getPropertyValue('--plot-bg').trim(), 
        range:[-maxAmp, maxAmp],
        autorange: false,
        fixedrange: true
      },
      aspectmode: "manual",
      aspectratio: {
        x: 2,
        y: 1,
        z: 1
      }
    },
    paper_bgcolor:getComputedStyle(document.body).getPropertyValue('--plot-paper').trim(),
    plot_bgcolor:getComputedStyle(document.body).getPropertyValue('--plot-bg').trim(),
    template: darkMode ? "plotly_dark" : "plotly_white",
    hovermode:false,
    legend:{bgcolor:"rgba(0,0,0,0)"}
  };
  if(includeCamera){
    layout.scene.camera = INITIAL_CAMERA;
  }
  return layout;
}

function getCurrentView(){
  if(!plotDiv || !plotDiv._fullLayout || !plotDiv._fullLayout.scene) return {};
  const cam = plotDiv._fullLayout.scene.camera;
  const aspect = plotDiv._fullLayout.scene.aspectmode || "auto";
  return { camera: cam ? JSON.parse(JSON.stringify(cam)) : null, aspect };
}

let plotDiv = null;

function updatePlot(useReact=false){
  const {sumRe, sumIm, components, maxAmp, translatedComponents, tvec, timePoints} = computeData();
  const showComps = document.getElementById("showComponents").checked;
  const showPh = document.getElementById("showPhasors").checked;
  const chainedComponents = document.getElementById("chainedComponents").checked;

  const traces = [];
  const totalColor = getComputedStyle(document.body)
    .getPropertyValue('--total-' + (darkMode ? 'dark' : 'light')).trim();

  if(showComps && !chainedComponents){
    for(const c of components){
      const k = c.k;
      const color = getColorForHarmonic(k);
      traces.push({
        type:"scatter3d", mode:"lines",
        x:c.tvec, y:Array.from(c.re), z:Array.from(c.im),
        line:{width:LINE_WIDTH_COMPONENT, color},
        hoverinfo:"skip", name:`k=${k}`
      });
    }
  }
  
  if(chainedComponents && translatedComponents && translatedComponents.length > 0) {
    for(let i = 0; i < translatedComponents.length; i++) {
      const tComp = translatedComponents[i];
      const color = getColorForHarmonic(tComp.k);
      
      traces.push({
        type:"scatter3d", mode:"lines",
        x:tComp.tvec, y:Array.from(tComp.re), z:Array.from(tComp.im),
        line:{width:LINE_WIDTH_COMPONENT, color},
        hoverinfo:"skip", 
        name: `k=${tComp.k}`
      });
    }
  }
  
  // Total curve trace
  traces.push({
    type:"scatter3d", mode:"lines",
    x:tvec, y:Array.from(sumRe), z:Array.from(sumIm),
    line:{width:LINE_WIDTH_TOTAL, color: totalColor},
    hoverinfo:"skip", name:tr[lang].total
  });

  // Current point on the curve (only in animation mode)
  if (animationState.enabled && timePoints > 0) {
    const currentIdx = timePoints - 1;
    traces.push({
      type:"scatter3d", mode:"markers",
      x:[tvec[currentIdx]], y:[sumRe[currentIdx]], z:[sumIm[currentIdx]],
      marker:{size:8, color: totalColor},
      hoverinfo:"skip", name:"Current Point", showlegend:false
    });
  }

  if(showPh){
    // In static mode, use t=0; in animation mode, use current time
    const tRef = animationState.enabled ? animationState.currentTime : 0;
    
    if(chainedComponents) {
      let accumRe = 0, accumIm = 0;
      
      const nonZeroCoeffs = [];
      for(let k = -N_HARMONICS; k <= N_HARMONICS; k++){
        if(coefficients[k].magnitude > 0) {
          nonZeroCoeffs.push(k);
        }
      }
      
      const kOrder = [];
      if(nonZeroCoeffs.includes(0)) kOrder.push(0);
      for(let i = 1; i <= N_HARMONICS; i++) {
        if(nonZeroCoeffs.includes(i)) kOrder.push(i);
        if(nonZeroCoeffs.includes(-i)) kOrder.push(-i);
      }
      
      for(let idx = 0; idx < kOrder.length; idx++) {
        const k = kOrder[idx];
        const A = coefficients[k].magnitude;
        const phi = coefficients[k].phase;
        const phasorRe = A * Math.cos(k * OMEGA0 * tRef + phi);
        const phasorIm = A * Math.sin(k * OMEGA0 * tRef + phi);
        
        const nextRe = accumRe + phasorRe;
        const nextIm = accumIm + phasorIm;
        
        const color = getColorForHarmonic(k);
        traces.push({
          type:"scatter3d", mode:"lines",
          x:[tRef, tRef], y:[accumRe, nextRe], z:[accumIm, nextIm],
          line:{width: LINE_WIDTH_PHASOR, color},
          hoverinfo:"skip", showlegend:false
        });
        
        if(idx < kOrder.length - 1) {
          traces.push({
            type:"scatter3d", mode:"markers",
            x:[tRef], y:[nextRe], z:[nextIm],
            marker:{size:4, color},
            hoverinfo:"skip", showlegend:false
          });
        }
        
        accumRe = nextRe;
        accumIm = nextIm;
      }
      
      if(kOrder.length > 0) {
        traces.push({
          type:"scatter3d", mode:"markers",
          x:[tRef], y:[accumRe], z:[accumIm],
          marker:{size:8, color: totalColor},
          hoverinfo:"skip", showlegend:false
        });
      }
      
    } else {
      let tipReTot = 0, tipImTot = 0;
      for(let k = -N_HARMONICS; k <= N_HARMONICS; k++){
        if(coefficients[k].magnitude === 0) continue;
        const A = coefficients[k].magnitude;
        const phi = coefficients[k].phase;
        const tipRe = A * Math.cos(k * OMEGA0 * tRef + phi);
        const tipIm = A * Math.sin(k * OMEGA0 * tRef + phi);
        tipReTot += tipRe; tipImTot += tipIm;

        if(showComps){
          const color = getColorForHarmonic(k);
          traces.push({ type:"scatter3d", mode:"lines", x:[tRef, tRef], y:[0, tipRe], z:[0, tipIm],
            line:{width: LINE_WIDTH_PHASOR, color}, hoverinfo:"skip", showlegend:false });
          traces.push({ type:"scatter3d", mode:"markers", x:[tRef], y:[tipRe], z:[tipIm],
            marker:{size:6, color}, hoverinfo:"skip", showlegend:false });
        }
      }
      traces.push({ type:"scatter3d", mode:"lines", x:[tRef, tRef], y:[0, tipReTot], z:[0, tipImTot],
        line:{width: LINE_WIDTH_PHASOR, color: totalColor}, hoverinfo:"skip", showlegend:false });
      traces.push({ type:"scatter3d", mode:"markers", x:[tRef], y:[tipReTot], z:[tipImTot],
        marker:{size:8, color: totalColor}, hoverinfo:"skip", showlegend:false });
    }
  }

  const config = {responsive: true, displaylogo: false};
  const view = getCurrentView();
  let layout = layoutWithCamera(!initialized, maxAmp);
  
  // Preserve camera and aspect from current view
  if(view.camera){
    const cam = JSON.parse(JSON.stringify(view.camera));
    cam.projection = cam.projection || {};
    cam.projection.type = "orthographic";
    layout.scene.camera = cam;
  }
  if(view.aspect){ 
    layout.scene.aspectmode = view.aspect; 
  }
  
  // CRITICAL: Always enforce fixed ranges and disable autorange after any interaction
  layout.scene.xaxis.autorange = false;
  layout.scene.yaxis.autorange = false;
  layout.scene.zaxis.autorange = false;
  layout.scene.xaxis.range = [0, animationState.maxTime];
  layout.scene.yaxis.range = [-maxAmp, maxAmp];
  layout.scene.zaxis.range = [-maxAmp, maxAmp];

  if(!initialized){
    Plotly.newPlot("plot3d", traces, layout, config).then(gd => { 
      plotDiv = gd; 
      initialized = true; 
    });
  } else {
    Plotly.react("plot3d", traces, layout, config);
  }
}

/* ================= CAMERA VIEWS ================= */
function setView(view){
  let eye, up = {x:0, y:0, z:1};
  let aspect = "auto";
  if(view === "real"){ eye = {x:0, y:0, z:2.8}; up = {x:0, y:1, z:0}; }
  else if(view === "imag"){ eye = {x:0, y:-2.8, z:0}; }
  else if(view === "plane"){ eye = {x:2.8, y:0, z:0}; aspect = "cube"; }
  else if(view === "3D"){ eye = {x:1.8, y:-1.8, z:1.2}; aspect = "cube"; }
  Plotly.relayout("plot3d", {
    "scene.camera.eye": eye,
    "scene.camera.up": up,
    "scene.camera.projection.type": "orthographic",
    "scene.aspectmode": aspect
  });
}

  document.getElementById("languageSelector").addEventListener("change", function(e) { lang = e.target.value; applyLanguage(); });
  document.getElementById("toggleTheme").addEventListener("click", function() { darkMode = !darkMode; document.body.classList.toggle("dark-mode", darkMode); document.getElementById("toggleTheme").textContent = darkMode ? tr[lang].lightMode : tr[lang].darkMode; updatePlot(true); });
  document.getElementById("toggleSidebar").addEventListener("click", function() { sidebarHidden = !sidebarHidden; document.body.classList.toggle("sidebar-collapsed", sidebarHidden); document.getElementById("toggleSidebar").textContent = sidebarHidden ? tr[lang].showControls : tr[lang].hideControls; setTimeout(()=>{ if(Plotly && Plotly.Plots) Plotly.Plots.resize("plot3d"); }, 50); });
  document.getElementById("showComponents").addEventListener("change", function() { 
    cachedMaxAmp = null; // Invalidate cache
    updatePlot(true); 
    updateShowComponentsState();
  });
  document.getElementById("showPhasors").addEventListener("change", function() { updatePlot(true); });
  document.getElementById("chainedComponents").addEventListener("change", function() { 
    cachedMaxAmp = null; // Invalidate cache when chained mode changes
    updatePlot(true); 
    updateShowComponentsState();
  });
  
  // Animation enable/disable checkbox
  document.getElementById("animationEnabled").addEventListener("change", function() {
    animationState.enabled = this.checked;
    updateAnimationControlsState();
    if (!animationState.enabled) {
      // Reset time to 0 when disabling animation
      animationState.currentTime = 0;
    }
    updateTimeDisplay();
    updateTimeSlider();
    updatePlot(true);
  });
  
  document.getElementById("viewReal").addEventListener("click", function() { setView("real"); });
  document.getElementById("viewImag").addEventListener("click", function() { setView("imag"); });
  document.getElementById("viewPlane").addEventListener("click", function() { setView("plane"); });
  document.getElementById("view3D").addEventListener("click", function() { setView("3D"); });
  document.getElementById("presetSquare").addEventListener("click", applyPresetSquare);
  document.getElementById("presetTriangle").addEventListener("click", applyPresetTriangle);
  document.getElementById("presetAll0").addEventListener("click", applyPresetAll);
  document.getElementById("presetZeroNegZeroPos").addEventListener("click", applyPresetZeroNegZeroPos);
  document.getElementById("presetFlower").addEventListener("click", applyPresetFlower);
  document.getElementById("presetPentagon").addEventListener("click", applyPresetPentagon);
  document.getElementById("presetLissajous").addEventListener("click", applyPresetLissajous);
  
  // Animation controls
  document.getElementById("resetBtn").addEventListener("click", resetAnimation);
  document.getElementById("playPauseBtn").addEventListener("click", togglePlayPause);
  
  // Time slider controls
  const timeSlider = document.getElementById("timeSlider");
  timeSlider.addEventListener("mousedown", function() {
    if (!animationState.enabled) return;
    animationState.userControlling = true;
    if (animationState.isPlaying) {
      pauseAnimation();
    }
  });
  
  timeSlider.addEventListener("input", function(e) {
    if (animationState.userControlling && animationState.enabled) {
      setTime(parseFloat(e.target.value));
    }
  });
  
  timeSlider.addEventListener("mouseup", function() {
    animationState.userControlling = false;
  });
  
  // Speed control
  document.getElementById("speedSlider").addEventListener("input", function(e) {
    // Invert the slider: left=slow(60s), right=fast(5s)
    const sliderValue = parseFloat(e.target.value);
    const invertedValue = 65 - sliderValue; // 65 = min + max = 5 + 60
    animationState.cycleDuration = invertedValue * 1000; // Convert to milliseconds
  });
  
  var tabButtons = document.querySelectorAll('.tab-button');
  for(var i = 0; i < tabButtons.length; i++) {
    tabButtons[i].addEventListener('click', function() { switchTab(this.getAttribute('data-tab')); });
  }
  window.addEventListener("resize", function() { if(Plotly && Plotly.Plots) Plotly.Plots.resize("plot3d"); });
}

/* ================= INIT ================= */
function initializeApp() {
  buildControls(); 
  updateShowComponentsState();
  updateAnimationControlsState(); // Initialize animation controls state
  updateTimeDisplay();
  updatePlayPauseButton();
  updatePlot(); 
  wireEvents();
}

if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', initializeApp);
} else {
  initializeApp();
}
</script>
</body>
</html>
