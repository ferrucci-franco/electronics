  function step4t(key) {
    const dict = step4Texts[state.lang] || step4Texts.es;
    return dict[key] || key;
  }

  // Step 4 constants and state
  const STEP4_BAUD_RATE = 115200;  // Change this to match your board's baudrate
  const STEP4_AC_BIAS_VOLTAGE = 1.5;  // AC bias in volts (target voltage)

  const step4State = {
    port: null,
    reader: null,
    writer: null,
    connected: false,
    availablePorts: [],
    consoleLogs: [],
    lastSentConfig: null,  // {filterName, Fs, fc, N, filt}
    rxBuffer: '',  // Buffer for incoming serial data
    vref: 3.3,  // Reference voltage (updated by vref command)
    waitingForVref: false  // Flag to capture vref response
  };

  // Refresh available serial ports
  async function step4RefreshPorts() {
    if (!('serial' in navigator)) {
      step4Log(step4t('no_serial'), 'err');
      return;
    }

    try {
      const ports = await navigator.serial.getPorts();
      step4State.availablePorts = ports;

      const select = document.getElementById('step4PortSelect');
      if (!select) return;

      select.innerHTML = `<option value="">${step4t('select_port')}</option>`;

      for (let i = 0; i < ports.length; i++) {
        const port = ports[i];
        const info = port.getInfo();
        let label = `Port ${i + 1}`;
        if (info.usbVendorId) {
          label = `USB ${info.usbVendorId.toString(16)}:${info.usbProductId.toString(16)}`;
        }
        select.innerHTML += `<option value="${i}">${label}</option>`;
      }

      if (ports.length === 0) {
        step4Log('No ports available. Click Connect to request access.', 'info');
      }
    } catch (err) {
      step4Log(`Error: ${err.message}`, 'err');
    }
  }

  // Get filter coefficients from step3
  function getFilterCoefficients() {
    const { filt, maN, lpR, hpR, Fs } = step3State;
    const Fnyq = Fs / 2;
    let a = [1];
    let b = [1];
    let filterName = '';
    let fc = 0;
    let N = maN;

    if (filt === 'bypass') {
      filterName = step3t('filter_bypass');
      a = [1];
      b = [1];
    } else if (filt === 'ma') {
      filterName = step3t('filter_ma');
      a = [1];
      b = new Array(N).fill(1/N);
    } else if (filt === 'lp') {
      fc = lpR * Fnyq;
      const w0 = 2 * Math.PI * fc / Fs;
      const alpha = Math.sin(w0) / (2 * 0.707);
      const cosw0 = Math.cos(w0);
      const a0 = 1 + alpha;
      a = [1, (-2 * cosw0) / a0, (1 - alpha) / a0];
      b = [(1 - cosw0) / (2 * a0), (1 - cosw0) / a0, (1 - cosw0) / (2 * a0)];
      filterName = step3t('filter_lp');
    } else if (filt === 'hp') {
      fc = hpR * Fnyq;
      const w0 = 2 * Math.PI * fc / Fs;
      const alpha = Math.sin(w0) / (2 * 0.707);
      const cosw0 = Math.cos(w0);
      const a0 = 1 + alpha;
      a = [1, (-2 * cosw0) / a0, (1 - alpha) / a0];
      b = [(1 + cosw0) / (2 * a0), -(1 + cosw0) / a0, (1 + cosw0) / (2 * a0)];
      filterName = step3t('filter_hp');
    } else if (filt === 'diff') {
      filterName = step3t('filter_diff');
      a = [1];
      b = [1, -1];
    }

    return { a, b, filterName, Fs, fc, N, filt };
  }

  // Build difference equation strings (filter + DAC timing)
  function buildEquationString(a, b) {
    let eq = 'y[n] = ';
    const bTerms = [];
    const aTerms = [];

    for (let i = 0; i < b.length; i++) {
      const coef = b[i];
      if (Math.abs(coef) > 1e-10) {
        const delay = i === 0 ? 'x[n]' : `x[n-${i}]`;
        bTerms.push(`b<sub>${i}</sub>·${delay}`);
      }
    }

    for (let i = 1; i < a.length; i++) {
      const coef = -a[i];
      if (Math.abs(coef) > 1e-10) {
        const delay = `y[n-${i}]`;
        aTerms.push(`a<sub>${i}</sub>·${delay}`);
      }
    }

    const allTerms = [...bTerms, ...aTerms];
    eq += allTerms.join(' + ').replace(/\+ -/g, '- ');

    return {
      filter: eq || 'y[n] = x[n]',
      dac: 'y<sub>OUT</sub>[n] = y[n-1]'
    };
  }

  // Add log to console
  function step4Log(message, type = 'info') {
    const timestamp = new Date().toLocaleTimeString();
    step4State.consoleLogs.push({ timestamp, message, type });
    if (step4State.consoleLogs.length > 200) {
      step4State.consoleLogs.shift();
    }
    updateConsoleDisplay();
  }

  function updateConsoleDisplay() {
    const output = document.getElementById('step4ConsoleOutput');
    if (!output) return;
    output.innerHTML = step4State.consoleLogs.map(log =>
      `<div class="step4-log-${log.type}">[${log.timestamp}] ${log.message}</div>`
    ).join('');
    output.scrollTop = output.scrollHeight;
  }

  // Serial port functions
  async function step4Connect() {
    if (!('serial' in navigator)) {
      step4Log(step4t('no_serial'), 'err');
      return;
    }

    try {
      const select = document.getElementById('step4PortSelect');
      const selectedIdx = select ? select.value : '';

      if (selectedIdx !== '' && step4State.availablePorts[selectedIdx]) {
        step4State.port = step4State.availablePorts[selectedIdx];
      } else {
        step4State.port = await navigator.serial.requestPort();
        step4RefreshPorts();
      }

      await step4State.port.open({ baudRate: STEP4_BAUD_RATE });
      step4State.connected = true;
      step4Log(`${step4t('port_opened')} @ ${STEP4_BAUD_RATE} baud`, 'info');
      updateStep4UI();
      startReading();

      // Query board's Vref for AC bias calculation
      step4State.waitingForVref = true;
      await step4Send('vref');
    } catch (err) {
      step4Log(`${step4t('error_connect')}: ${err.message}`, 'err');
    }
  }

  async function step4Disconnect() {
    step4State.connected = false;

    try {
      if (step4State.reader) {
        await step4State.reader.cancel();
        step4State.reader.releaseLock();
        step4State.reader = null;
      }
    } catch (err) {
      // Ignore reader errors during disconnect
    }

    try {
      if (step4State.port) {
        await step4State.port.close();
        step4State.port = null;
      }
    } catch (err) {
      step4Log(`Error: ${err.message}`, 'err');
    }

    step4State.rxBuffer = '';  // Clear buffer on disconnect
    step4Log(step4t('port_closed'), 'info');
    updateStep4UI();
  }

  async function startReading() {
    const decoder = new TextDecoder();

    while (step4State.port && step4State.port.readable && step4State.connected) {
      step4State.reader = step4State.port.readable.getReader();

      try {
        while (true) {
          const { value, done } = await step4State.reader.read();
          if (done) break;
          if (value) {
            // Decode bytes to string and buffer
            step4State.rxBuffer += decoder.decode(value, { stream: true });
            const lines = step4State.rxBuffer.split('\n');
            // Keep the last incomplete line in buffer
            step4State.rxBuffer = lines.pop();
            // Log all complete lines
            for (const line of lines) {
              const trimmed = line.trim();
              if (trimmed) {
                // Check if waiting for vref response
                if (step4State.waitingForVref) {
                  const vrefValue = parseFloat(trimmed);
                  if (!isNaN(vrefValue) && vrefValue > 0 && vrefValue <= 10) {
                    step4State.vref = vrefValue;
                    step4State.waitingForVref = false;
                    step4Log(`RX: ${trimmed} (Vref=${vrefValue}V)`, 'rx');
                    continue;
                  }
                }
                step4Log(`RX: ${trimmed}`, 'rx');
              }
            }
          }
        }
      } catch (err) {
        if (err.name !== 'AbortError' && step4State.connected) {
          step4Log(`Read error: ${err.message}`, 'err');
        }
      } finally {
        if (step4State.reader) {
          step4State.reader.releaseLock();
        }
      }
      break;
    }
  }

  async function step4Send(data) {
    if (!step4State.connected || !step4State.port) {
      step4Log('Not connected', 'err');
      return;
    }

    try {
      const encoder = new TextEncoder();
      const writer = step4State.port.writable.getWriter();
      await writer.write(encoder.encode(data + '\n'));
      writer.releaseLock();
      step4Log(`TX: ${data}`, 'tx');
    } catch (err) {
      step4Log(`Send error: ${err.message}`, 'err');
    }
  }

  async function step4SendConfig() {
    const { a, b, Fs, filterName, fc, N, filt } = getFilterCoefficients();

    // Send sampling frequency first (needed for all modes)
    await step4Send(`fs ${Fs}`);

    // Send bypass or filter mode
    if (filt === 'bypass') {
      await step4Send('bypass');
    } else {
      // Set filter mode and send coefficients
      await step4Send('filter');

      // Send coefficients based on filter type
      const bStr = '[' + b.map(x => x.toFixed(6)).join(',') + ']';

      if (a.length <= 1) {
        // FIR filter (MA, diff)
        await step4Send(`fir ${bStr}`);
      } else {
        // IIR filter (LP, HP) - a[0]=1 is implicit, send a[1..n]
        const aStr = '[' + a.slice(1).map(x => x.toFixed(6)).join(',') + ']';
        await step4Send(`iir ${bStr} ${aStr}`);
      }

      // Set AC mode based on filter type
      // AC ON for HP and diff (they need DC-centered signals)
      // AC OFF for MA and LP
      if (filt === 'hp' || filt === 'diff') {
        const acBias = STEP4_AC_BIAS_VOLTAGE / step4State.vref;
        await step4Send(`ac set ${acBias.toFixed(6)}`);
        await step4Send('ac on');
      } else {
        await step4Send('ac off');
      }
    }

    step4Log(step4t('config_sent'), 'info');

    // Store last sent config
    step4State.lastSentConfig = { filterName, Fs, fc, N, filt };
    updateLastConfigDisplay();
  }

  function updateLastConfigDisplay() {
    const container = document.getElementById('step4LastConfigContent');
    if (!container) return;

    const cfg = step4State.lastSentConfig;
    if (!cfg) {
      container.innerHTML = `<span style="color:var(--fg);opacity:0.5">${step4t('no_config_sent')}</span>`;
      return;
    }

    let html = `
      <div class="step4-param-grid">
        <span class="step4-param-label">${step4t('fs_label')}:</span>
        <span class="step4-param-value">${cfg.Fs} Hz</span>
        <span class="step4-param-label">${step4t('filter_type')}:</span>
        <span class="step4-param-value">${cfg.filterName}</span>
    `;

    if (cfg.filt === 'ma') {
      html += `
        <span class="step4-param-label">${step4t('order_label')} N:</span>
        <span class="step4-param-value">${cfg.N}</span>
      `;
    } else if (cfg.filt === 'lp' || cfg.filt === 'hp') {
      html += `
        <span class="step4-param-label">${step4t('cutoff_freq')}:</span>
        <span class="step4-param-value">${cfg.fc.toFixed(1)} Hz</span>
      `;
    }

    html += '</div>';
    container.innerHTML = html;
  }

  function updateStep4UI() {
    const connectBtn = document.getElementById('step4ConnectBtn');
    const disconnectBtn = document.getElementById('step4DisconnectBtn');
    const sendConfigBtn = document.getElementById('step4SendConfigBtn');
    const statusEl = document.getElementById('step4Status');

    if (connectBtn) connectBtn.disabled = step4State.connected;
    if (disconnectBtn) disconnectBtn.disabled = !step4State.connected;
    if (sendConfigBtn) sendConfigBtn.disabled = !step4State.connected;

    if (statusEl) {
      statusEl.textContent = step4State.connected ? step4t('status_connected') : step4t('status_disconnected');
      statusEl.className = `step4-status ${step4State.connected ? 'connected' : 'disconnected'}`;
    }
  }

  function renderStep4() {
    const { a, b, filterName, Fs, fc, N, filt } = getFilterCoefficients();
    const equation = buildEquationString(a, b);

    // Build coefficients table
    const maxLen = Math.max(a.length, b.length);
    let tableRows = '';
    for (let i = 0; i < maxLen; i++) {
      const bVal = i < b.length ? b[i].toFixed(6) : '-';
      const aVal = i < a.length ? a[i].toFixed(6) : '-';
      tableRows += `<tr><td>${i}</td><td>${bVal}</td><td>${aVal}</td></tr>`;
    }

    // Determine which extra parameters to show
    const showN = (filt === 'ma');
    const showFc = (filt === 'lp' || filt === 'hp');

    stepContentEl.innerHTML = `
      <div class="step4-wrapper">
        <!-- Filter Parameters Card -->
        <div class="step4-card step4-params">
          <p class="step3-plot-title">${step4t('params_title')}</p>
          <div class="step4-param-grid">
            <span class="step4-param-label">${step4t('fs_label')}:</span>
            <span class="step4-param-value">${Fs} Hz</span>
            <span class="step4-param-label">${step4t('filter_type')}:</span>
            <span class="step4-param-value">${filterName}</span>
            ${showN ? `
            <span class="step4-param-label">${step4t('order_label')} N:</span>
            <span class="step4-param-value">${N}</span>
            ` : ''}
            ${showFc ? `
            <span class="step4-param-label">${step4t('cutoff_freq')}:</span>
            <span class="step4-param-value">${fc.toFixed(1)} Hz</span>
            ` : ''}
          </div>
        </div>

        <!-- Last Config Sent Card -->
        <div class="step4-card step4-lastconfig">
          <p class="step3-plot-title">${step4t('lastconfig_title')}</p>
          <div id="step4LastConfigContent">
            <span style="color:var(--fg);opacity:0.5">${step4t('no_config_sent')}</span>
          </div>
        </div>

        <!-- Serial Port Card -->
        <div class="step4-card step4-serial">
          <p class="step3-plot-title">${step4t('serial_title')}</p>
          <div class="step4-serial-controls">
            <select id="step4PortSelect">
              <option value="">${step4t('select_port')}</option>
            </select>
            <button id="step4RefreshBtn" class="step4-btn">↻</button>
            <button id="step4ConnectBtn" class="step4-btn">${step4t('connect')}</button>
            <button id="step4DisconnectBtn" class="step4-btn step4-btn-danger" disabled>${step4t('disconnect')}</button>
          </div>
          <div class="step4-serial-controls" style="margin-top:8px;">
            <span class="step4-param-label">Status:</span>
            <span id="step4Status" class="step4-status disconnected">${step4t('status_disconnected')}</span>
            <button id="step4SendConfigBtn" class="step4-btn" disabled>${step4t('send_config')}</button>
          </div>
        </div>

        <!-- Difference Equation Card -->
        <div class="step4-card step4-equation">
          <p class="step3-plot-title">${step4t('equation_title')}</p>
          <div class="step4-equation-display">
            <div style="margin-bottom:4px">${equation.filter}</div>
            <div style="margin-bottom:8px">${equation.dac}</div>
            <div style="font-size:0.75em;color:var(--muted);line-height:1.4">
              <div>x[n]: ${step4t('desc_x')}</div>
              <div>y[n]: ${step4t('desc_y')}</div>
              <div>y<sub>OUT</sub>[n]: ${step4t('desc_yout')}</div>
            </div>
          </div>
          <table class="step4-coef-table">
            <thead>
              <tr><th>n</th><th>b<sub>n</sub></th><th>a<sub>n</sub></th></tr>
            </thead>
            <tbody>${tableRows}</tbody>
          </table>
        </div>

        <!-- Console Card -->
        <div class="step4-card step4-console">
          <p class="step3-plot-title">${step4t('console_title')}</p>
          <div id="step4ConsoleOutput" class="step4-console-output"></div>
          <div class="step4-console-input">
            <input type="text" id="step4ConsoleInput" placeholder="Enter command...">
            <button id="step4SendBtn" class="step4-btn">${step4t('send')}</button>
            <button id="step4ClearBtn" class="step4-btn">${step4t('clear')}</button>
          </div>
        </div>
      </div>
    `;

    // Attach event listeners
    document.getElementById('step4RefreshBtn').addEventListener('click', step4RefreshPorts);
    document.getElementById('step4ConnectBtn').addEventListener('click', step4Connect);
    document.getElementById('step4DisconnectBtn').addEventListener('click', step4Disconnect);
    document.getElementById('step4SendConfigBtn').addEventListener('click', step4SendConfig);

    // Initial port refresh
    step4RefreshPorts();

    document.getElementById('step4SendBtn').addEventListener('click', () => {
      const input = document.getElementById('step4ConsoleInput');
      if (input.value.trim()) {
        step4Send(input.value.trim());
        input.value = '';
      }
    });

    document.getElementById('step4ConsoleInput').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        const input = e.target;
        if (input.value.trim()) {
          step4Send(input.value.trim());
          input.value = '';
        }
      }
    });

    document.getElementById('step4ClearBtn').addEventListener('click', () => {
      step4State.consoleLogs = [];
      updateConsoleDisplay();
    });

    updateConsoleDisplay();
    updateStep4UI();
    updateLastConfigDisplay();
  }

  // STEPS NAV
  function setActiveStep(step){
    state.step = step;
    stepTabs.forEach(btn=>{
      btn.classList.toggle('active', Number(btn.dataset.step)===step);
    });
    loadStepContent();
  }
  stepTabs.forEach(btn=>{
    btn.addEventListener('click', ()=>setActiveStep(Number(btn.dataset.step)));
  });

  // LANGUAGE
  function setLanguage(lang){
    state.lang = lang;
    document.getElementById('appTitle').textContent = appTitles[lang].main;
    document.getElementById('appSubtitle').textContent = appTitles[lang].sub;
    document.getElementById('stepLabel1').textContent = stepLabels[lang][1];
    document.getElementById('stepLabel2').textContent = stepLabels[lang][2];
    document.getElementById('stepLabel3').textContent = stepLabels[lang][3];
    document.getElementById('stepLabel4').textContent = stepLabels[lang][4];
    document.getElementById('stepLabel5').textContent = stepLabels[lang][5];
    loadStepContent();
  }
  langSelect.addEventListener('change', ()=>setLanguage(langSelect.value));

  // LOAD CONTENT
  function loadStepContent(){
    const {step,lang} = state;
    if(step===1){
      stepContentEl.innerHTML = marked.parse(markdownContent.step1[lang]);
    } else if(step===2){
      renderStep2();
    } else if(step===3){
      renderStep3();
    } else if(step===4){
      renderStep4();
    } else {
      const placeholder = {
        es:'Esta sección se llenará con herramientas interactivas en los siguientes pasos del desarrollo.',
        fr:'Cette section sera complétée avec des outils interactifs dans les prochaines étapes du développement.',
        en:'This section will be filled with interactive tools in the next development steps.'
      };
      stepContentEl.innerHTML = `<p>${placeholder[lang]}</p>`;
    }
    stepNoteEl.textContent = stepNotes[lang][step] || '';
  }

  // INIT
  applyTheme('light');
  setLanguage('en');
  setActiveStep(1);
</script>
