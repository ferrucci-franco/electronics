name: Deploy Time Series Explorer to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/timeseries-explorer-pages.yml'
      - 'timeseries-explorer/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: timeseries-explorer-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: timeseries-explorer/package-lock.json

      - name: Install dependencies
        working-directory: timeseries-explorer
        run: npm ci

      - name: Build
        working-directory: timeseries-explorer
        run: npm run build

      - name: Assemble Pages site
        run: |
          mkdir -p site
          rsync -a \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='.temp/' \
            --exclude='site/' \
            --exclude='timeseries-explorer/node_modules/' \
            --exclude='timeseries-explorer/dist/' \
            --exclude='timeseries-explorer/backup/' \
            ./ ./site/
          rm -rf site/openmodelica-viewer
          rm -rf site/timeseries-explorer
          mkdir -p site/timeseries-explorer
          cp -R timeseries-explorer/dist/. site/timeseries-explorer/
          touch site/.nojekyll

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
