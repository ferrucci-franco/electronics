name: Deploy OpenModelica Viewer to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/openmodelica-viewer-pages.yml'
      - 'openmodelica-viewer/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: openmodelica-viewer-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: openmodelica-viewer/package-lock.json

      - name: Install dependencies
        working-directory: openmodelica-viewer
        run: npm ci

      - name: Build
        working-directory: openmodelica-viewer
        run: npm run build

      - name: Assemble Pages site
        run: |
          mkdir -p site
          rsync -a \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='.temp/' \
            --exclude='site/' \
            --exclude='openmodelica-viewer/node_modules/' \
            --exclude='openmodelica-viewer/dist/' \
            --exclude='openmodelica-viewer/backup/' \
            ./ ./site/
          rm -rf site/openmodelica-viewer
          mkdir -p site/openmodelica-viewer
          cp -R openmodelica-viewer/dist/. site/openmodelica-viewer/
          touch site/.nojekyll

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
